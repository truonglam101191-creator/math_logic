<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Park Master</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;900&display=swap"
        rel="stylesheet">

    <style>
        /* ============================================
           CSS RESET & BASE STYLES
           ============================================ */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            touch-action: none;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ============================================
           CSS CUSTOM PROPERTIES
           ============================================ */
        :root {
            /* Colors */
            --color-primary: #00D9FF;
            --color-primary-hover: #00B8D4;
            --color-primary-glow: rgba(0, 217, 255, 0.4);
            --color-success: #00E676;
            --color-success-glow: rgba(0, 230, 118, 0.4);
            --color-warning: #FFD600;
            --color-danger: #FF3D00;
            --color-danger-hover: #DD2C00;
            --color-neutral-dark: #1A1A1A;
            --color-neutral-mid: #424242;
            --color-neutral-light: #E0E0E0;
            --color-glass: rgba(255, 255, 255, 0.1);
            --color-glass-border: rgba(255, 255, 255, 0.2);
            --color-backdrop: rgba(0, 0, 0, 0.6);

            /* Spacing (8px grid) */
            --space-xs: 8px;
            --space-sm: 16px;
            --space-md: 24px;
            --space-lg: 32px;
            --space-xl: 48px;

            /* Animation Timings */
            --transition-fast: 150ms;
            --transition-normal: 300ms;
            --transition-slow: 500ms;

            /* Easing Functions */
            --ease-out: cubic-bezier(0.0, 0, 0.2, 1);
            --ease-bounce: cubic-bezier(0.68, -0.6, 0.32, 1.6);

            /* Shadows */
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.15);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.2);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.3);
            --shadow-fab: 0 8px 24px rgba(0, 0, 0, 0.4);

            /* Glows */
            --glow-primary: 0 0 24px var(--color-primary-glow);
            --glow-success: 0 0 24px var(--color-success-glow);
        }

        /* ============================================
           GAME CANVAS
           ============================================ */
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            background: #808080;
        }

        /* ============================================
           UI OVERLAY CONTAINER
           ============================================ */
        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        /* ============================================
           STATUS BAR (TOP)
           ============================================ */
        .status-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 80px;
            background: var(--color-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--color-glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 var(--space-sm);
            pointer-events: auto;
            box-shadow: var(--shadow-md);
        }

        /* Edit mode: hide status-bar background but keep children visible */
        .status-bar.edit-mode {
            background: transparent;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            border-bottom: none;
            box-shadow: none;
            height: 60px;
            padding: var(--space-xs) var(--space-sm);
            pointer-events: none;
            /* Don't block clicks in edit mode */
        }

        /* But allow clicks on level-info and menu-button */
        .status-bar.edit-mode .level-info,
        .status-bar.edit-mode .menu-button {
            pointer-events: auto;
        }

        .level-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .level-number {
            font-size: 24px;
            font-weight: 700;
            color: rgba(255, 255, 255, 1);
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .timer-display {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .timer-icon {
            font-size: 40px;
            color: white;
            text-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
        }

        .timer-value {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 56px;
            font-weight: 400;
            color: white;
            text-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
            letter-spacing: 2px;
            line-height: 1;
            min-width: 80px;
            text-align: left;
            transform: translateY(5px);
        }

        .menu-button {
            width: 48px;
            height: 48px;
            background: var(--color-glass);
            border: 1px solid var(--color-glass-border);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all var(--transition-fast) var(--ease-out);
            box-shadow: var(--shadow-sm);
        }

        .menu-button:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.2);
        }

        .menu-icon {
            width: 24px;
            height: 24px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            justify-content: center;
        }

        .menu-icon span {
            width: 100%;
            height: 3px;
            background: white;
            border-radius: 2px;
        }

        .pause-icon {
            width: 24px;
            height: 24px;
            display: flex;
            gap: 6px;
            justify-content: center;
            align-items: center;
        }

        .pause-icon span {
            width: 6px;
            height: 24px;
            background: white;
            border-radius: 2px;
        }

        /* ============================================
           BOTTOM CONTROL PANEL
           ============================================ */
        .control-panel {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 120px;
            background: var(--color-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--color-glass-border);
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 0 var(--space-sm);
            pointer-events: auto;
            box-shadow: 0 -8px 32px rgba(0, 0, 0, 0.3);
        }

        .control-panel.hidden {
            display: none;
        }

        .speed-gauge {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .speed-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--color-neutral-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .speed-value {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 32px;
            color: white;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .speed-bar {
            width: 80px;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            overflow: hidden;
        }

        .speed-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--color-success), var(--color-warning), var(--color-danger));
            border-radius: 4px;
            transition: width var(--transition-fast) var(--ease-out);
            width: 0%;
        }

        .level-progress {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .progress-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--color-neutral-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .progress-dots {
            display: flex;
            gap: 8px;
        }

        .progress-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transition: all var(--transition-normal) var(--ease-out);
        }

        .progress-dot.active {
            background: var(--color-primary);
            box-shadow: var(--glow-primary);
        }

        .progress-dot.completed {
            background: var(--color-success);
        }

        /* ============================================
           FLOATING ACTION BUTTON (RESTART)
           ============================================ */
        .fab {
            position: absolute;
            bottom: 140px;
            right: var(--space-sm);
            width: 96px;
            height: 96px;
            background: linear-gradient(135deg, var(--color-danger), var(--color-danger-hover));
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            pointer-events: auto;
            box-shadow: var(--shadow-fab);
            transition: all var(--transition-normal) var(--ease-out);
            z-index: 100;
        }

        .fab:active {
            transform: scale(0.9);
        }

        @media (prefers-reduced-motion: no-preference) {
            .fab:hover {
                transform: scale(1.05);
                box-shadow: var(--shadow-fab), 0 0 32px rgba(255, 61, 0, 0.5);
            }
        }

        .fab-icon {
            font-size: 48px;
            font-weight: bold;
            color: white;
            line-height: 1;
        }

        /* ============================================
           LEVEL COMPLETE MODAL
           ============================================ */
        .modal-backdrop {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--color-backdrop);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            pointer-events: none;
            opacity: 0;
            transition: opacity var(--transition-normal) var(--ease-out);
            z-index: 200;
        }

        .modal-backdrop.show {
            pointer-events: auto;
            opacity: 1;
        }

        .level-complete {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            width: calc(100% - 64px);
            max-width: 480px;
            background: white;
            padding: var(--space-xl) var(--space-md);
            border-radius: 24px;
            text-align: center;
            box-shadow: var(--shadow-lg);
            pointer-events: none;
            opacity: 0;
            transition: all var(--transition-normal) var(--ease-out);
            z-index: 201;
        }

        .level-complete.show {
            pointer-events: auto;
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .complete-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 48px;
            font-weight: 400;
            color: var(--color-neutral-dark);
            margin: 0 0 var(--space-md) 0;
            letter-spacing: 2px;
        }

        .stars {
            font-size: 72px;
            margin: var(--space-md) 0;
            line-height: 1;
        }

        @media (prefers-reduced-motion: no-preference) {
            .stars {
                animation: starPulse 0.6s var(--ease-bounce);
            }
        }

        .time-result {
            font-size: 24px;
            font-weight: 600;
            color: var(--color-neutral-mid);
            margin: var(--space-md) 0;
        }

        .time-value {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 40px;
            color: var(--color-primary);
            display: block;
            margin-top: 8px;
        }

        .star-thresholds {
            display: flex;
            justify-content: center;
            gap: var(--space-sm);
            margin: var(--space-md) 0;
            font-size: 14px;
            color: var(--color-neutral-mid);
        }

        .threshold-item {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 16px;
        }

        .modal-buttons {
            display: flex;
            gap: var(--space-sm);
            margin-top: var(--space-lg);
        }

        .modal-button {
            flex: 1;
            background: var(--color-primary);
            color: white;
            border: none;
            padding: 20px;
            font-size: 20px;
            font-weight: 700;
            border-radius: 16px;
            cursor: pointer;
            transition: all var(--transition-fast) var(--ease-out);
            box-shadow: var(--shadow-md);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .modal-button:active {
            transform: scale(0.95);
        }

        .modal-button.secondary {
            background: var(--color-neutral-light);
            color: var(--color-neutral-dark);
        }

        /* ============================================
           PAUSE MODAL
           ============================================ */
        .pause-modal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            width: calc(100% - 64px);
            max-width: 400px;
            background: white;
            padding: var(--space-xl) var(--space-md);
            border-radius: 24px;
            text-align: center;
            box-shadow: var(--shadow-lg);
            pointer-events: none;
            opacity: 0;
            transition: all var(--transition-normal) var(--ease-out);
            z-index: 201;
        }

        .pause-modal.show {
            pointer-events: auto;
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .pause-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 48px;
            font-weight: 400;
            color: var(--color-neutral-dark);
            margin: 0 0 var(--space-lg) 0;
            letter-spacing: 2px;
        }

        .pause-buttons {
            display: flex;
            flex-direction: column;
            gap: var(--space-sm);
        }

        .pause-button {
            width: 100%;
            background: var(--color-primary);
            color: white;
            border: none;
            padding: 20px;
            font-size: 20px;
            font-weight: 700;
            border-radius: 16px;
            cursor: pointer;
            transition: all var(--transition-fast) var(--ease-out);
            box-shadow: var(--shadow-md);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .pause-button:active {
            transform: scale(0.95);
        }

        .pause-button.secondary {
            background: var(--color-neutral-light);
            color: var(--color-neutral-dark);
        }

        /* ============================================
           EDIT MODE PALETTE (BOTTOM DRAWER)
           ============================================ */
        .edit-drawer {
            position: absolute;
            bottom: -800px;
            left: 0;
            right: 0;
            height: 600px;
            background: white;
            border-radius: 24px 24px 0 0;
            padding: var(--space-md);
            pointer-events: auto;
            box-shadow: var(--shadow-lg);
            transition: bottom var(--transition-slow) var(--ease-out);
            z-index: 201;
            display: none;
        }

        .edit-drawer.show {
            display: block;
            bottom: 0;
        }

        .drawer-handle {
            width: 48px;
            height: 4px;
            background: var(--color-neutral-light);
            border-radius: 2px;
            margin: 0 auto var(--space-md);
        }

        .drawer-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--color-neutral-dark);
            margin-bottom: var(--space-md);
            text-align: center;
        }

        .palette-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--space-sm);
            max-height: 480px;
            overflow-y: auto;
            padding-bottom: var(--space-md);
        }

        .palette-item {
            aspect-ratio: 1;
            background: var(--color-neutral-light);
            border: 3px solid transparent;
            border-radius: 16px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            color: var(--color-neutral-dark);
            transition: all var(--transition-fast) var(--ease-out);
            padding: 8px;
        }

        .palette-item:active {
            transform: scale(0.95);
        }

        .palette-item.selected {
            border-color: var(--color-primary);
            background: rgba(0, 217, 255, 0.1);
            box-shadow: var(--glow-primary);
        }

        /* ============================================
           DIRECTION CONTROL BUTTONS
           ============================================ */
        .direction-controls {
            position: fixed !important;
            bottom: 20px;
            left: 0;
            right: 0;
            height: auto;
            display: none;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 15px;
            padding-bottom: env(safe-area-inset-bottom, 15px);
            pointer-events: auto !important;
            z-index: 9999 !important;
            touch-action: manipulation;
        }

        .movement-controls {
            display: flex;
            gap: 10px;
            pointer-events: auto !important;
            touch-action: manipulation;
        }

        .action-controls {
            display: flex;
            gap: 10px;
            pointer-events: auto !important;
            touch-action: manipulation;
        }

        .direction-btn {
            width: 70px;
            height: 70px;
            background: rgba(0, 0, 0, 0.6);
            border: 3px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            color: #FFFFFF;
            font-size: 32px;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            position: relative;
            pointer-events: auto !important;
            touch-action: manipulation;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .direction-btn:active,
        .direction-btn.pressed {
            background: rgba(0, 200, 255, 0.8) !important;
            transform: scale(0.92);
            border-color: #00D9FF;
        }

        /* ============================================
           RESPONSIVE MOBILE STYLES
           ============================================ */
        @media screen and (max-width: 480px) {
            .direction-controls {
                bottom: 10px;
                padding: 0 10px;
            }

            .direction-btn {
                width: 60px;
                height: 60px;
                font-size: 24px;
            }

            .movement-controls,
            .action-controls {
                gap: 5px;
            }

            .status-bar {
                height: 60px;
            }

            .level-display {
                font-size: 14px !important;
            }

            .timer-display {
                font-size: 20px !important;
            }
        }

        @media screen and (min-width: 481px) and (max-width: 768px) {
            .direction-controls {
                bottom: 8px;
                padding: 0 15px;
            }

            .direction-btn {
                width: 75px;
                height: 75px;
                font-size: 32px;
            }

            .movement-controls,
            .action-controls {
                gap: 8px;
            }
        }

        @media screen and (min-width: 769px) {
            .direction-btn {
                width: 90px;
                height: 90px;
                font-size: 40px;
            }

            .movement-controls,
            .action-controls {
                gap: 12px;
            }
        }

        /* ============================================
           CRASH EFFECT
           ============================================ */
        @media (prefers-reduced-motion: no-preference) {
            .crash-effect {
                animation: screenShake 0.5s var(--ease-out);
            }

            .crash-flash {
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: var(--color-danger);
                opacity: 0;
                pointer-events: none;
                animation: flashRed 0.5s var(--ease-out);
            }
        }

        .collision-effect {
            position: absolute;
            pointer-events: none;
            z-index: 150;
        }

        .collision-burst {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 255, 255, 1) 0%, rgba(255, 200, 0, 0.8) 30%, rgba(255, 100, 0, 0) 70%);
            animation: burstExpand 0.5s var(--ease-out) forwards;
        }

        .collision-text {
            position: absolute;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 64px;
            font-weight: 900;
            color: #FF3D00;
            text-shadow:
                -3px -3px 0 #FFF,
                3px -3px 0 #FFF,
                -3px 3px 0 #FFF,
                3px 3px 0 #FFF,
                0 0 20px rgba(255, 61, 0, 0.8);
            transform: translate(-50%, -50%) scale(0) rotate(-15deg);
            animation: crashTextPop 0.6s var(--ease-bounce) forwards;
            letter-spacing: 4px;
        }

        .collision-particles {
            position: absolute;
        }

        .particle {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #FFD600;
            border-radius: 50%;
            animation: particleFly 0.6s var(--ease-out) forwards;
        }

        /* ============================================
           START INDICATOR
           ============================================ */
        .start-indicator {
            position: absolute;
            pointer-events: none;
            z-index: 150;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 0px;
            animation: floatUpDown 1.5s ease-in-out infinite;
        }

        .start-indicator.show {
            display: flex;
        }

        .start-text {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 48px;
            font-weight: 700;
            color: #FFD600;
            text-shadow:
                -2px -2px 0 #000,
                2px -2px 0 #000,
                -2px 2px 0 #000,
                2px 2px 0 #000,
                0 0 16px rgba(255, 214, 0, 0.8);
            letter-spacing: 4px;
        }

        .start-arrow {
            font-size: 32px;
            color: #FFD600;
            text-shadow:
                -2px -2px 0 #000,
                2px -2px 0 #000,
                -2px 2px 0 #000,
                2px 2px 0 #000,
                0 0 16px rgba(255, 214, 0, 0.8);
            margin-top: -15px;
        }

        /* ============================================
           TOAST NOTIFICATIONS
           ============================================ */
        .toast {
            position: absolute;
            top: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: var(--color-neutral-dark);
            color: white;
            padding: var(--space-sm) var(--space-md);
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            box-shadow: var(--shadow-lg);
            pointer-events: none;
            opacity: 0;
            transition: all var(--transition-normal) var(--ease-out);
            z-index: 300;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* ============================================
           KEYFRAME ANIMATIONS
           ============================================ */
        @keyframes starPulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.2);
            }
        }

        @keyframes screenShake {

            0%,

        let dragOffsetY = 0;

        // Device detection
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
            (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

        /**
         * Web Audio wrapper that mimics HTML5 Audio API
         * Used for iOS to provide better audio support
         */
        class WebAudioSound {
            constructor() {
                this.audioContext = null;
                this.audioBuffer = null;
                this.sourceNode = null;
                this.gainNode = null;
                this.url = '';
                this.isLooping = false;
                this.isPlaying = false;
                this.isPaused = false;
                this.currentTime = 0;
                this.startTime = 0;
                this.pauseTime = 0;
                this._playbackRate = 1.0;
                this.volumeValue = 1.0;

                // Initialize AudioContext (lazy initialization)
                if (isIOS && !WebAudioSound.sharedContext) {
                    WebAudioSound.sharedContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                this.audioContext = WebAudioSound.sharedContext;
            }

            set src(url) {
                this.url = url;
                this.load();
            }

            set loop(value) {
                this.isLooping = value;
            }

            get loop() {
                return this.isLooping;
            }

            set volume(value) {
                this.volumeValue = Math.max(0,Math.min(1,value));
                if (this.gainNode) {
                    this.gainNode.gain.value = this.volumeValue;
                }
            }

            get volume() {
                return this.volumeValue;
            }

            get currentTime() {
                if (this.isPlaying && this.audioContext) {
                    return this.audioContext.currentTime - this.startTime;
                }
                return this.isPaused ? this.pauseTime : 0;
            }

            set currentTime(value) {
                // Reset playback position
                const wasPlaying = this.isPlaying;

                if (wasPlaying) {
                    this.pause();
                }

                this.pauseTime = value;
                this.startTime = 0;
                this.isPaused = false;

                if (wasPlaying) {
                    this.play();
                }
            }

            get playbackRate() {
                return this._playbackRate;
            }

            set playbackRate(value) {
                this._playbackRate = value;
                if (this.sourceNode) {
                    this.sourceNode.playbackRate.value = value;
                }
            }

            async load() {
                if (!this.url || !this.audioContext) return;

                try {
                    const response = await fetch(this.url);
                    const arrayBuffer = await response.arrayBuffer();
                    this.audioBuffer = await this.audioContext.decodeAudioData(arrayBuffer);
                    console.log('Audio loaded successfully:',this.url);
                } catch (error) {
                    console.error('Error loading audio:',this.url,error);
                }
            }

            async play() {
                if (!this.audioContext) {
                    console.error('No AudioContext available');
                    return;
                }

                // Wait for audio to load if not yet loaded
                if (!this.audioBuffer) {
                    console.log('Waiting for audio buffer to load...');
                    // Wait a bit for the buffer to load (up to 5 seconds)
                    const maxWaitTime = 5000;
                    const startWait = Date.now();
                    while (!this.audioBuffer && (Date.now() - startWait) < maxWaitTime) {
                        await new Promise(resolve => setTimeout(resolve,100));
                    }

                    if (!this.audioBuffer) {
                        console.error('Audio buffer still not loaded after waiting');
                        return;
                    }
                }

                // Resume AudioContext if suspended (required for iOS)
                if (this.audioContext.state === 'suspended') {
                    this.audioContext.resume();
                }

                // Stop current playback if exists
                if (this.sourceNode) {
                    try {
                        this.sourceNode.stop();
                        this.sourceNode.disconnect();
                    } catch (e) {
                        // Source may already be stopped
                    }
                }

                // Create new source node
                this.sourceNode = this.audioContext.createBufferSource();
                this.sourceNode.buffer = this.audioBuffer;
                this.sourceNode.loop = this.isLooping;
                this.sourceNode.playbackRate.value = this._playbackRate;

                // Create gain node for volume control
                if (!this.gainNode) {
                    this.gainNode = this.audioContext.createGain();
                }
                this.gainNode.gain.value = this.volumeValue;

                // Connect nodes
                this.sourceNode.connect(this.gainNode);
                this.gainNode.connect(this.audioContext.destination);

                // Handle playback end
                this.sourceNode.onended = () => {
                    if (!this.isLooping) {
                        this.isPlaying = false;
                    }
                };

                // Start playback
                const offset = this.isPaused ? this.pauseTime : 0;
                this.sourceNode.start(0,offset);
                this.startTime = this.audioContext.currentTime - offset;
                this.isPlaying = true;
                this.isPaused = false;
            }

            pause() {
                if (!this.sourceNode || !this.isPlaying) return;

                // Calculate current playback position
                this.pauseTime = this.audioContext.currentTime - this.startTime;

                // Stop the source
                try {
                    this.sourceNode.stop();
                    this.sourceNode.disconnect();
                } catch (e) {
                    // Source may already be stopped
                }
                this.sourceNode = null;

                this.isPlaying = false;
                this.isPaused = true;
            }
        }

        // Shared AudioContext for all Web Audio sounds (iOS best practice)
        WebAudioSound.sharedContext = null;

        /**
         * HTML5 Audio wrapper that provides consistent loading behavior
         * Used for non-iOS platforms
         */
        class HTML5AudioSound {
            constructor() {
                this.audio = new Audio();
                this.isReady = false;
                this.loadPromise = null;
            }

            set src(url) {
                this.audio.src = url;
                this.isReady = false;

                // Create a promise that resolves when audio can play
                this.loadPromise = new Promise((resolve,reject) => {
                    const onCanPlay = () => {
                        this.isReady = true;
                        console.log('Audio loaded successfully:',url);
                        cleanup();
                        resolve();
                    };

                    const onError = (e) => {
                        console.error('Error loading audio:',url,e);
                        cleanup();
                        reject(e);
                    };

                    const cleanup = () => {
                        this.audio.removeEventListener('canplaythrough',onCanPlay);
                        this.audio.removeEventListener('error',onError);
                    };

                    this.audio.addEventListener('canplaythrough',onCanPlay,{ once: true });
                    this.audio.addEventListener('error',onError,{ once: true });

                    this.audio.preload = 'auto';
                    this.audio.load();
                });
            }

            set loop(value) {
                this.audio.loop = value;
            }

            get loop() {
                return this.audio.loop;
            }

            set volume(value) {
                this.audio.volume = value;
            }

            get volume() {
                return this.audio.volume;
            }

            get currentTime() {
                return this.audio.currentTime;
            }

            set currentTime(value) {
                this.audio.currentTime = value;
            }

            get playbackRate() {
                return this.audio.playbackRate;
            }

            set playbackRate(value) {
                this.audio.playbackRate = value;
            }

            async play() {
                // Wait for audio to be ready
                if (!this.isReady && this.loadPromise) {
                    console.log('Waiting for audio to load...');
                    try {
                        await this.loadPromise;
                    } catch (error) {
                        console.error('Failed to load audio:',error);
                        return;
                    }
                }

                // Play the audio
                try {
                    await this.audio.play();
                } catch (error) {
                    console.error('Failed to play audio:',error);
                }
            }

            pause() {
                this.audio.pause();
            }
        }

        function showCollisionEffect(x,y) {

                const particle = document.createElement('div');
                particle.className = 'particle';

                const angle = (i / 8) * Math.PI * 2;
                const distance = 60 + Math.random() * 40;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;

                particle.style.setProperty('--tx',tx + 'px');
                particle.style.setProperty('--ty',ty + 'px');
                particle.style.animationDelay = (Math.random() * 0.1) + 's';

                particlesContainer.appendChild(particle);
            }

            effectContainer.appendChild(particlesContainer);

            // Add to DOM
            document.body.appendChild(effectContainer);

            // Remove after animation completes
            setTimeout(() => {
                effectContainer.remove();
            },800);
        }

            // Position the start indicator above the player car's bounding box (screen coordinate system)

            const rotationRad = Math.abs(playerRotation * Math.PI / 180);

                (CAR_HEIGHT / 2) * Math.abs(Math.cos(rotationRad));

            const screenY = (indicatorY / canvas.height) * rect.height + rect.top;

        /* ==================================================
