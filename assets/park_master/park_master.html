        function preloadAssets(assetIds,onComplete) {
            let imagesToLoad = 0;
            let imagesLoaded = 0;

            assetIds.forEach(id => {
                const assetInfo = lib.getAsset(id);
                if (assetInfo) {
                    if (assetInfo.type === 'audio') {
                        // Use Web Audio for iOS, HTML5AudioSound wrapper for other platforms
                        const audio = isIOS ? new WebAudioSound() : new HTML5AudioSound();

                        if (assetInfo.loop === 'true' || assetInfo.loop === true) {
                            audio.loop = true;
                            audio.volume = 0.5;
                        }

                        audio.src = assetInfo.url;

                        assetCache[id] = audio;
                    } else {
                        imagesToLoad++;
                        const img = new Image();
                        // Enable CORS to allow pixel data access
                        img.crossOrigin = 'anonymous';
                        img.onload = () => {
                            imagesLoaded++;
                            if (imagesLoaded === imagesToLoad && onComplete) {
                                onComplete();
                            }
                        };
                        img.onerror = () => {
                            imagesLoaded++;
                            lib.log(`Failed to load image: ${id}`);
                            if (imagesLoaded === imagesToLoad && onComplete) {
                                onComplete();
                            }
                        };
                        img.src = assetInfo.url;
                        assetCache[id] = img;
                    }
                }
            });

            // If no images to load, call complete immediately
            if (imagesToLoad === 0 && onComplete) {
                onComplete();
            }
        }

        /**
         * Generate pixel mask for an image
         * @param {HTMLImageElement} image - The image to generate mask from
         * @param {number} width - Width to render the image
         * @param {number} height - Height to render the image
         * @param {number} alphaThreshold - Alpha threshold (default 0)
         * @returns {Array<Array<boolean>>} 2D array where true = solid pixel
         */
        function generatePixelMask(image,width,height,alphaThreshold = 0) {
            // Create temporary canvas to extract pixel data
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = width;
            tempCanvas.height = height;
            const tempCtx = tempCanvas.getContext('2d');

            // Draw the image
            tempCtx.drawImage(image,0,0,width,height);

            // Get pixel data
            const imageData = tempCtx.getImageData(0,0,width,height);
            const pixels = imageData.data;

            // Create 2D mask array
            const mask = [];
            for (let y = 0; y < height; y++) {
                mask[y] = [];
                for (let x = 0; x < width; x++) {
                    const index = (y * width + x) * 4;
                    const alpha = pixels[index + 3];
                    mask[y][x] = alpha > alphaThreshold;
                }
            }

            return mask;
        }

        /**
         * Generate pixel masks for all car images
         * Should be called after images are loaded
         */
        function generateCarPixelMasks() {
            const carAssets = [
                'player_car',
                'parked_car_yellow',
                'parked_car_green',
                'parked_car_purple',
                'parked_car_white'
            ];

            carAssets.forEach(assetId => {
                const img = assetCache[assetId];
                if (img && img.complete) {
                    pixelMasks[assetId] = generatePixelMask(img,CAR_WIDTH,CAR_HEIGHT,0);
                    lib.log(`Generated pixel mask for ${assetId}: ${CAR_WIDTH}x${CAR_HEIGHT}`);
                }
            });
        }

        /**
         * Generate pixel masks for obstacle types (shared across all instances)
         * This should be called after level is loaded and images are ready
         */
        function generateObstaclePixelMasks() {
            // Define obstacle type metadata: asset ID and standard dimensions
            const obstacleTypes = {
                'greenery': { assetId: 'greenery_patch',width: 240,height: 120 },
                'barrier': { assetId: 'barrier_obstacle',width: 100,height: 40 }
            };

            let maskCount = 0;

            // Generate one mask per obstacle type (shared by all instances)
            Object.entries(obstacleTypes).forEach(([type,metadata]) => {
                // Only generate if not already exists
                if (!pixelMasks[type]) {
                    const img = assetCache[metadata.assetId];
                    if (img && img.complete) {
                        pixelMasks[type] = generatePixelMask(img,metadata.width,metadata.height,0);
                        maskCount++;
                        lib.log(`Generated shared pixel mask for ${type}: ${metadata.width}x${metadata.height}`);
                    }
                }
            });

            lib.log(`Generated ${maskCount} shared obstacle pixel masks for level ${Number(window.gameConfig.currentLevel) + 1}`);
        }

        function snapToGrid(value) {
            return Math.round(value / GRID_SIZE) * GRID_SIZE;
        }

        function getCurrentLevel() {
            const levelIndex = Number(window.gameConfig.currentLevel) || 0;
            const levels = window.gameConfig.levels;
            if (!levels || !Array.isArray(levels) || levels.length === 0) {
                lib.log('Error: No levels found in gameConfig');
                return null;
            }
            if (levelIndex < 0 || levelIndex >= levels.length) {
                lib.log('Error: Invalid level index:',levelIndex);
                return levels[0];
            }
            return levels[levelIndex];
        }

        function initializePlayer(isRetry = false) {
            const level = getCurrentLevel();

            // Guard against null level
            if (!level) {
                lib.log('Error: Cannot initialize player - no valid level');
                showToast('Error: No level data found!',3000);
                return false;
            }

            // Ensure playerStart exists with defaults
            const playerStart = level.playerStart || { x: 360,y: 900,rotation: 0 };
            playerX = playerStart.x;
            playerY = playerStart.y;
            playerRotation = playerStart.rotation || 0;
            playerVelocityX = 0;
            playerVelocityY = 0;
            playerSpeed = 0;
            gameTimer = 0;
            timerStarted = false;
            levelComplete = false;
            crashed = false;
            hideCrashedCar = false;
            frontWheelAngle = 0;

            if (isRetry) {
                // Reset moving cars to their initial positions and reinitialize states
                // First, restore positions from existing movingCarStates if they exist
                if (movingCarStates.length > 0) {
                    movingCarStates.forEach(carState => {
                        carState.currentX = carState.startX;
                        carState.currentY = carState.startY;
                        carState.isMovingToTarget = false;
                        carState.isWaiting = true;
                        carState.isFirstMove = true;
                        carState.elapsedTime = 0;
                    });
                }
            }
            else {
                // Then reinitialize all moving car states
                movingCarStates = [];
                const obstacles = level.obstacles || [];
                obstacles.forEach((obstacle,index) => {
                    if (obstacle.type === 'parked_car' && obstacle.canMove) {
                        movingCarStates.push({
                            obstacleIndex: index,
                            startX: obstacle.x,
                            startY: obstacle.y,
                            currentX: obstacle.x,  // Runtime position
                            currentY: obstacle.y,  // Runtime position
                            targetX: obstacle.targetX !== undefined ? obstacle.targetX : obstacle.x,
                            targetY: obstacle.targetY !== undefined ? obstacle.targetY : obstacle.y,
                            startDelay: obstacle.startDelay !== undefined ? obstacle.startDelay : 0,
                            moveSpeed: obstacle.moveSpeed !== undefined ? obstacle.moveSpeed : 100,
                            moveLoopInterval: obstacle.moveLoopInterval !== undefined ? obstacle.moveLoopInterval : 5,
                            elapsedTime: 0,
                            isMovingToTarget: false,
                            isWaiting: true,
                            isFirstMove: true // Track if this is the first move (for startDelay)
                        });
                    }
                });

                // Find the first park_spot in decorations
                const decorations = level.decorations || [];
                currentParkingSpot = decorations.find(deco => deco.type === 'park_spot');
                if (!currentParkingSpot) {
                    showToast('Error: No parking spot found in level!',3000);
                    console.error('No park_spot found in level decorations');
                }
            }

            hideLevelCompleteModal();
            updateLevelUI();
            uiElements.timerDisplay.textContent = '0';

            // Show start indicator in play mode
            if (currentMode === 'play') {
                showStartIndicator();
            }

            return true;
        }

        function checkRectCollision(x1,y1,w1,h1,rot1,x2,y2,w2,h2,rot2) {
            const corners1 = getRotatedCorners(x1,y1,w1,h1,rot1);
            const corners2 = getRotatedCorners(x2,y2,w2,h2,rot2);

            for (let corner of corners1) {
                if (pointInRotatedRect(corner.x,corner.y,x2,y2,w2,h2,rot2)) {
                    return true;
                }
            }

            for (let corner of corners2) {
                if (pointInRotatedRect(corner.x,corner.y,x1,y1,w1,h1,rot1)) {
                    return true;
                }
            }

            return false;
        }

        /**
         * Check pixel-perfect collision between two objects with masks
         * @param {number} x1, y1 - Center position of object 1
         * @param {number} w1, h1 - Width and height of object 1
         * @param {number} rot1 - Rotation of object 1 in degrees
         * @param {Array<Array<boolean>>} mask1 - Pixel mask of object 1
         * @param {number} x2, y2 - Center position of object 2
         * @param {number} w2, h2 - Width and height of object 2
         * @param {number} rot2 - Rotation of object 2 in degrees
         * @param {Array<Array<boolean>>} mask2 - Pixel mask of object 2
         * @returns {Object|null} Collision info {collided: boolean, point: {x, y}} or null if no collision
         */
        function checkPixelCollision(x1,y1,w1,h1,rot1,mask1,x2,y2,w2,h2,rot2,mask2) {
            if (!mask1 || !mask2) return null;

            const rad1 = rot1 * Math.PI / 180;
            const cos1 = Math.cos(rad1);
            const sin1 = Math.sin(rad1);

            const rad2 = rot2 * Math.PI / 180;
            const cos2 = Math.cos(rad2);
            const sin2 = Math.sin(rad2);

            const maskHeight1 = mask1.length;
            const maskWidth1 = mask1[0].length;
            const maskHeight2 = mask2.length;
            const maskWidth2 = mask2[0].length;

            // Sample every few pixels for performance (can adjust step for accuracy vs speed)
            const step = 2;

            // Check pixels from object 1
            for (let localY = 0; localY < maskHeight1; localY += step) {
                for (let localX = 0; localX < maskWidth1; localX += step) {
                    // Skip if this pixel is transparent in mask1
                    if (!mask1[localY][localX]) continue;

                    // Convert from mask coordinates to local coordinates (centered)
                    const dx1 = localX - maskWidth1 / 2;
                    const dy1 = localY - maskHeight1 / 2;

                    // Rotate and translate to world coordinates
                    const worldX = x1 + dx1 * cos1 - dy1 * sin1;
                    const worldY = y1 + dx1 * sin1 + dy1 * cos1;

                    // Transform world coordinates to object 2's local space
                    const dx2 = worldX - x2;
                    const dy2 = worldY - y2;

                    // Rotate back to object 2's local coordinates
                    const local2X = dx2 * cos2 + dy2 * sin2;
                    const local2Y = -dx2 * sin2 + dy2 * cos2;

                    // Convert to mask2 coordinates (from centered to top-left origin)
                    const mask2X = Math.round(local2X + maskWidth2 / 2);
                    const mask2Y = Math.round(local2Y + maskHeight2 / 2);

                    // Check if this point is within mask2 bounds and is solid
                    if (mask2X >= 0 && mask2X < maskWidth2 &&
                        mask2Y >= 0 && mask2Y < maskHeight2) {
                        if (mask2[mask2Y][mask2X]) {
                            // Collision detected! Return collision point in world coordinates
                            return {
                                collided: true,
                                point: { x: worldX,y: worldY }
                            };
                        }
                    }
                }
            }

            return null;
        }

        /**
         * Enhanced collision check: first AABB/rect check, then pixel-perfect
         * @param {string} assetId1 - Asset ID for object 1 (to get pixel mask)
         * @param {number} x1, y1, w1, h1, rot1 - Object 1 parameters
         * @param {string} assetId2 - Asset ID for object 2 (to get pixel mask)
         * @param {number} x2, y2, w2, h2, rot2 - Object 2 parameters
         * @returns {Object|null} Collision info {collided: true, point: {x, y}} or null if no collision
         */
        function checkCollisionWithMask(assetId1,x1,y1,w1,h1,rot1,assetId2,x2,y2,w2,h2,rot2) {
            // First: Quick rectangle collision check
            if (!checkRectCollision(x1,y1,w1,h1,rot1,x2,y2,w2,h2,rot2)) {
                return null; // No collision at all
            }

            // Second: If rectangles collide, check pixel masks
            const mask1 = pixelMasks[assetId1];
            const mask2 = pixelMasks[assetId2];

            // If masks don't exist, fall back to rectangle collision
            // Use center point between two objects as approximate collision point
            if (!mask1 || !mask2) {
                return {
                    collided: true,
                    point: {
                        x: (x1 + x2) / 2,
                        y: (y1 + y2) / 2
                    }
                };
            }

            // Perform pixel-perfect collision
            const result = checkPixelCollision(x1,y1,w1,h1,rot1,mask1,x2,y2,w2,h2,rot2,mask2);
            return result;
        }

        /**
         * Enhanced collision check with direct mask support
         * @param {Array|null} mask1 - Pixel mask for object 1 (or null)
         * @param {number} x1, y1, w1, h1, rot1 - Object 1 parameters
         * @param {Array|null} mask2 - Pixel mask for object 2 (or null)
         * @param {number} x2, y2, w2, h2, rot2 - Object 2 parameters
         * @returns {Object|null} Collision info {collided: true, point: {x, y}} or null if no collision
         */
        function checkCollisionWithDirectMask(mask1,x1,y1,w1,h1,rot1,mask2,x2,y2,w2,h2,rot2) {
            // First: Quick rectangle collision check
            if (!checkRectCollision(x1,y1,w1,h1,rot1,x2,y2,w2,h2,rot2)) {
                return null; // No collision at all
            }

            // Second: If rectangles collide and both masks exist, check pixel collision
            if (mask1 && mask2) {
                return checkPixelCollision(x1,y1,w1,h1,rot1,mask1,x2,y2,w2,h2,rot2,mask2);
            }

            // If masks don't exist, fall back to rectangle collision
            // Use center point between two objects as approximate collision point
            return {
                collided: true,
                point: {
                    x: (x1 + x2) / 2,
                    y: (y1 + y2) / 2
                }
            };
        }

        function getRotatedCorners(cx,cy,w,h,rotation) {
            const corners = [
                { x: -w / 2,y: -h / 2 },
                { x: w / 2,y: -h / 2 },
                { x: w / 2,y: h / 2 },
                { x: -w / 2,y: h / 2 }
            ];

            const rad = rotation * Math.PI / 180;
            const cos = Math.cos(rad);
            const sin = Math.sin(rad);

            return corners.map(c => ({
                x: cx + c.x * cos - c.y * sin,
                y: cy + c.x * sin + c.y * cos
            }));
        }

        function pointInRotatedRect(px,py,cx,cy,w,h,rotation) {
            const rad = -rotation * Math.PI / 180;
            const cos = Math.cos(rad);
            const sin = Math.sin(rad);

            const dx = px - cx;
            const dy = py - cy;

            const localX = dx * cos - dy * sin;
            const localY = dx * sin + dy * cos;

            return Math.abs(localX) <= w / 2 && Math.abs(localY) <= h / 2;
        }

        function checkParkedInSpot() {
            if (!currentParkingSpot) return false;

            const spot = currentParkingSpot;

            // Check if all corners of player car are inside the parking spot
            const corners = getRotatedCorners(playerX,playerY,CAR_WIDTH,CAR_HEIGHT,playerRotation);
            for (let corner of corners) {
                if (!pointInRotatedRect(corner.x,corner.y,spot.x,spot.y,spot.width,spot.height,spot.rotation)) {
                    return false;
                }
            }

            // Check if player orientation matches parking spot orientation
            // Player image faces up (0°), parkspot image faces right (0°)
            // So player needs to rotate 90° clockwise to match parkspot
            const expectedPlayerRotation = spot.rotation + 90;
            let angleDiff = playerRotation - expectedPlayerRotation;

            // Normalize angle difference to [-180, 180]
            while (angleDiff > 180) angleDiff -= 360;
            while (angleDiff < -180) angleDiff += 360;

            // Allow ±15 degrees tolerance
            const angleTolerance = 15;
            if (Math.abs(angleDiff) > angleTolerance) {
                return false;
            }

            return true;
        }

        /**
         * Get the runtime position of an obstacle.
         * For moving cars, returns the current runtime position.
         * For static obstacles, returns the original position from config.
         */
        function getObstaclePosition(obstacle,obstacleIndex) {
            // Check if this is a moving car
            const movingCarState = movingCarStates.find(state => state.obstacleIndex === obstacleIndex);
            if (movingCarState) {
                return {
                    x: movingCarState.currentX,
                    y: movingCarState.currentY
                };
            }
            // Return original position for non-moving obstacles
            return {
                x: obstacle.x,
                y: obstacle.y
            };
        }

        function updateMovingCars(deltaTime,level) {
            // Guard against null level or obstacles
            if (!level || !level.obstacles || !Array.isArray(level.obstacles)) return;

            // Update each moving car's position
            movingCarStates.forEach(carState => {
                const obstacle = level.obstacles[carState.obstacleIndex];
                if (!obstacle || obstacle.type !== 'parked_car') return;

                carState.elapsedTime += deltaTime;

                // State machine for moving cars: A -> B -> teleport to A -> repeat
                if (carState.isWaiting) {
                    // Waiting state: check if we should start moving
                    const waitTime = carState.isFirstMove ? carState.startDelay : carState.moveLoopInterval;

                    if (carState.elapsedTime >= waitTime) {
                        // Start moving to target
                        carState.isWaiting = false;
                        carState.isMovingToTarget = true;
                        carState.elapsedTime = 0;
                        carState.isFirstMove = false;
                    }
                } else if (carState.isMovingToTarget) {
                    // Moving to target
                    const dx = carState.targetX - carState.currentX;
                    const dy = carState.targetY - carState.currentY;
                    const distanceToTarget = Math.sqrt(dx * dx + dy * dy);

                    if (distanceToTarget > 1) {
                        const moveDistance = carState.moveSpeed * deltaTime;
                        const ratio = Math.min(moveDistance / distanceToTarget,1);
                        carState.currentX += dx * ratio;
                        carState.currentY += dy * ratio;
                    } else {
                        // Reached target - teleport back to start and wait
                        carState.currentX = carState.startX;
                        carState.currentY = carState.startY;
                        carState.isMovingToTarget = false;
                        carState.isWaiting = true;
                        carState.elapsedTime = 0;
                    }
                }
            });
        }

        function updatePhysics(deltaTime) {
            if (crashed || levelComplete || gamePaused) return;

            const settings = window.gameConfig.settings || {};
            const level = getCurrentLevel();

            // Guard against null level
            if (!level) return;

            // Update moving cars
            updateMovingCars(deltaTime,level);

            let acceleration = 0;
            let steering = 0;

            // Debug: log keys state every few frames
            if (Math.random() < 0.02) {
                const activeKeys = Object.keys(keys).filter(k => keys[k]);
                if (activeKeys.length > 0) {
                    console.log('Active keys:',activeKeys);
                }
            }

            // Keyboard/touch input
            if (keys['ArrowUp'] || keys['w'] || keys['W']) {
                acceleration = 1;
                if (!timerStarted) {
                    timerStarted = true;
                    hideStartIndicator();
                }
            }
            if (keys['ArrowDown'] || keys['s'] || keys['S']) {
                acceleration = -1;
                if (!timerStarted) {
                    timerStarted = true;
                    hideStartIndicator();
                }
            }
            if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
                steering = -1;
                if (!timerStarted) {
                    timerStarted = true;
                    hideStartIndicator();
                }
            }
            if (keys['ArrowRight'] || keys['d'] || keys['D']) {
                steering = 1;
                if (!timerStarted) {
                    timerStarted = true;
                    hideStartIndicator();
                }
            }

            // Update front wheel angle based on steering input
            const maxWheelAngle = 25; // Maximum wheel turn angle in degrees
            const wheelTurnSpeed = 180; // Degrees per second

            if (steering < 0) {
                // Turn left
                frontWheelAngle = Math.max(frontWheelAngle - wheelTurnSpeed * deltaTime,-maxWheelAngle);
            } else if (steering > 0) {
                // Turn right
                frontWheelAngle = Math.min(frontWheelAngle + wheelTurnSpeed * deltaTime,maxWheelAngle);
            } else {
                // Return to center when no steering input
                if (frontWheelAngle > 0) {
                    frontWheelAngle = Math.max(0,frontWheelAngle - wheelTurnSpeed * deltaTime);
                } else if (frontWheelAngle < 0) {
                    frontWheelAngle = Math.min(0,frontWheelAngle + wheelTurnSpeed * deltaTime);
                }
            }

            // Apply physics
            if (acceleration > 0) {
                playerSpeed += ACCELERATION * deltaTime;
                playerSpeed = Math.min(playerSpeed,MAX_SPEED);
            } else if (acceleration < 0) {
                playerSpeed -= REVERSE_ACCELERATION * deltaTime;
                playerSpeed = Math.max(playerSpeed,-MAX_REVERSE_SPEED);
            }

            // Apply friction
            playerSpeed *= Math.pow(window.gameConfig.settings.friction,deltaTime * 60);
            //console.log(playerSpeed);

            // Apply steering (speed-dependent turn rate)
            if (Math.abs(playerSpeed) > 5) {
                const turnRate = window.gameConfig.settings.turnSpeed * (Math.abs(playerSpeed) / MAX_SPEED);
                // Reverse steering direction when reversing
                const steeringDirection = playerSpeed < 0 ? -steering : steering;
                playerRotation += steeringDirection * turnRate * deltaTime;
            }

            // Update velocity based on rotation
            const radians = (playerRotation * Math.PI) / 180;
            playerVelocityX = Math.sin(radians) * playerSpeed;
            playerVelocityY = -Math.cos(radians) * playerSpeed;

            // Update position
            playerX += playerVelocityX * deltaTime;
            playerY += playerVelocityY * deltaTime;

            // Check boundaries
            playerX = Math.max(CAR_WIDTH / 2,Math.min(720 - CAR_WIDTH / 2,playerX));
            playerY = Math.max(CAR_HEIGHT / 2,Math.min(1280 - CAR_HEIGHT / 2,playerY));

            // Check collisions with obstacles
            const obstacles = level.obstacles || [];
            for (let i = 0; i < obstacles.length; i++) {
                const obstacle = obstacles[i];
                const pos = getObstaclePosition(obstacle,i);
                let collisionInfo = null;

                // Get player mask
                const playerMask = pixelMasks['player_car'];

                // Check if this is a parked car (has assetId for pixel mask detection)
                if (obstacle.type === 'parked_car' && obstacle.assetId) {
                    // Use pixel-perfect collision for car vs car
                    collisionInfo = checkCollisionWithMask(
                        'player_car',playerX,playerY,CAR_WIDTH,CAR_HEIGHT,playerRotation,
                        obstacle.assetId,pos.x,pos.y,obstacle.width,obstacle.height,obstacle.rotation
                    );
                } else if (pixelMasks[obstacle.type] && playerMask) {
                    // Use pixel-perfect collision for obstacles with shared pixel masks
                    // (greenery, barrier)
                    collisionInfo = checkCollisionWithDirectMask(
                        playerMask,playerX,playerY,CAR_WIDTH,CAR_HEIGHT,playerRotation,
                        pixelMasks[obstacle.type],pos.x,pos.y,obstacle.width,obstacle.height,obstacle.rotation
                    );
                } else {
                    // Use standard rectangle collision for other obstacles
                    const rectCollision = checkRectCollision(
                        playerX,playerY,CAR_WIDTH,CAR_HEIGHT,playerRotation,
                        pos.x,pos.y,obstacle.width,obstacle.height,obstacle.rotation
                    );
                    if (rectCollision) {
                        // Use center point between player and obstacle as approximate collision point
                        collisionInfo = {
                            collided: true,
                            point: {
                                x: (playerX + pos.x) / 2,
                                y: (playerY + pos.y) / 2
                            }
                        };
                    }
                }

                if (collisionInfo && collisionInfo.collided) {
                    handleCrash(collisionInfo.point.x,collisionInfo.point.y);
                    return;
                }
            }

            // Check parking
            if (Math.abs(playerSpeed) < PARKING_SPEED_THRESHOLD && checkParkedInSpot()) {
                handleLevelComplete();
            }

            // Update engine audio
            if (engineAudio) {
                const pitchFactor = 0.8 + (Math.abs(playerSpeed) / MAX_SPEED) * 0.6;
                engineAudio.playbackRate = pitchFactor;
            }
        }

        function handleCrash(collisionX,collisionY) {
            crashed = true;
            playerSpeed = 0;

            // Show collision effect at actual collision point
            // If no collision point provided, default to player position
            const effectX = collisionX !== undefined ? collisionX : playerX;
            const effectY = collisionY !== undefined ? collisionY : playerY;
            showCollisionEffect(effectX,effectY);

            showCrashEffect();

            if (assetCache['crash_sound']) {
                assetCache['crash_sound'].currentTime = 0;
                assetCache['crash_sound'].play();
            }

            if (engineAudio) {
                engineAudio.pause();
            }

            // Hide the car after 1 second
            setTimeout(() => {
                hideCrashedCar = true;
            },1000);

            // Reset the level after 2 seconds (1 second after car disappears)
            setTimeout(() => {
                initializePlayer(true);
                if (engineAudio && currentMode === 'play') {
                    engineAudio.currentTime = 0;
                    engineAudio.play();
                }
            },2000);
        }

        /**
         * Save user progress to persistent storage
         * @param {number} levelIndex - Current level index
         * @param {number} time - Completion time
         * @param {number} stars - Stars earned
         */
        async function saveUserProgress(levelIndex,time,stars) {
            try {
                // Load existing progress
                const savedData = await lib.getUserGameState();
                let progress = savedData && savedData.state ? savedData.state : {
                    currentLevel: 0,
                    levelProgress: []
                };

                // Initialize levelProgress array if needed
                if (!progress.levelProgress) {
                    progress.levelProgress = [];
                }

                // Update progress for this level
                if (!progress.levelProgress[levelIndex]) {
                    progress.levelProgress[levelIndex] = {
                        bestTime: time,
                        bestStars: stars,
                        completed: true
                    };
                } else {
                    // Update if this is a better time
                    if (time < progress.levelProgress[levelIndex].bestTime) {
                        progress.levelProgress[levelIndex].bestTime = time;
                    }
                    // Update if this is more stars
                    if (stars > progress.levelProgress[levelIndex].bestStars) {
                        progress.levelProgress[levelIndex].bestStars = stars;
                    }
                    progress.levelProgress[levelIndex].completed = true;
                }

                // Update current level (unlock next level)
                // if (levelIndex >= progress.currentLevel) {
                //     progress.currentLevel = Math.min(levelIndex + 1, window.gameConfig.levels.length - 1);
                // }
                progress.currentLevel = (levelIndex + 1) % window.gameConfig.levels.length;

                // Save to persistent storage
                await lib.saveUserGameState(progress);
                lib.log('Progress saved successfully');
            } catch (error) {
                lib.log('Error saving progress: ' + error.message);
            }
        }

        /**
         * Load user progress from persistent storage
         */
        async function loadUserProgress() {
            try {
                const savedData = await lib.getUserGameState();
                if (savedData && savedData.state) {
                    lib.log('Progress loaded successfully');
                    return savedData.state;
                } else {
                    lib.log('No saved progress found');
                    return null;
                }
            } catch (error) {
                lib.log('Error loading progress: ' + error.message);
                return null;
            }
        }

        async function handleLevelComplete() {
            if (levelComplete) return;

            levelComplete = true;

            if (engineAudio) {
                engineAudio.pause();
            }

            const level = getCurrentLevel();
            let stars = 0;
            if (gameTimer < level.starThresholds[2]) stars = 3;
            else if (gameTimer < level.starThresholds[1]) stars = 2;
            else if (gameTimer < level.starThresholds[0]) stars = 1;

            // Save user progress
            await saveUserProgress(window.gameConfig.currentLevel,gameTimer,stars);

            if (assetCache['success_sound']) {
                assetCache['success_sound'].currentTime = 0;
                assetCache['success_sound'].play();
            }

            setTimeout(() => {
                if (assetCache['star_rating_sound']) {
                    assetCache['star_rating_sound'].currentTime = 0;
                    assetCache['star_rating_sound'].play();
                }

                showLevelCompleteModal(stars,gameTimer);
            },500);
        }

        function render() {
            const level = getCurrentLevel();

            ctx.fillStyle = '#808080';
            ctx.fillRect(0,0,720,1280);

            // Guard against null level
            if (!level) {
                ctx.fillStyle = '#FFFFFF';
                ctx.font = '32px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('Loading level...',360,640);
                return;
            }

            // Update start indicator position if visible
            if (!timerStarted && currentMode === 'play' && !crashed && !levelComplete) {
                updateStartIndicatorPosition();
            }

            ctx.restore();

            const decorations = level.decorations || [];
            for (let deco of decorations) {
                if (deco.type === 'road_line_dashed' || deco.type === 'road_line_solid') {
                    ctx.save();
                    ctx.translate(deco.x,deco.y);
                    ctx.rotate(deco.rotation * Math.PI / 180);

                    ctx.strokeStyle = 'white';
                    ctx.lineWidth = 10;

                    if (deco.type === 'road_line_dashed') {
                        ctx.setLineDash([20,20]);
                    } else {
                        ctx.setLineDash([]);
                    }

                    ctx.beginPath();
                    ctx.moveTo(-deco.length / 2,0);
                    ctx.lineTo(deco.length / 2,0);
                    ctx.stroke();
                    ctx.setLineDash([]);
                } else if (deco.type === 'park_spot') {
                    ctx.save();
                    ctx.translate(deco.x,deco.y);
                    ctx.rotate(deco.rotation * Math.PI / 180);

                    const img = assetCache['park_spot_marker'];
                    if (img && img.complete && img.naturalWidth > 0) {
                        ctx.drawImage(img,-deco.width / 2,-deco.height / 2,deco.width,deco.height);
                    } else {
                        // Draw fallback parking spot
                        ctx.strokeStyle = '#FFD600';
                        ctx.lineWidth = 4;
                        ctx.setLineDash([]);
                        // Draw parking spot outline
                        ctx.strokeRect(-deco.width / 2,-deco.height / 2,deco.width,deco.height);
                        // Draw "P" text
                        ctx.fillStyle = '#FFD600';
                        ctx.font = 'bold 40px Arial';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText('P',0,0);
                    }
                    ctx.restore();
                }

                ctx.restore();
            }

            const obstacles = level.obstacles || [];
            for (let i = 0; i < obstacles.length; i++) {
                const obs = obstacles[i];
                const pos = getObstaclePosition(obs,i);
                ctx.save();
                ctx.translate(pos.x,pos.y);
                ctx.rotate(obs.rotation * Math.PI / 180);

                if (obs.type === 'barrier') {
                    const barrierAsset = assetCache['barrier_obstacle'];
                    if (barrierAsset) {
                        ctx.drawImage(barrierAsset,-obs.width / 2,-obs.height / 2,obs.width,obs.height);
                    } else {
                        ctx.fillStyle = '#555555';
                        ctx.fillRect(-obs.width / 2,-obs.height / 2,obs.width,obs.height);
                    }
                } else if (obs.type === 'greenery') {
                    const greeneryAsset = assetCache['greenery_patch'];
                    if (greeneryAsset) {
                        ctx.drawImage(greeneryAsset,-obs.width / 2,-obs.height / 2,obs.width,obs.height);
                    } else {
                        ctx.fillStyle = '#2ECC40';
                        ctx.fillRect(-obs.width / 2,-obs.height / 2,obs.width,obs.height);
                    }
                } else if (obs.type === 'greenery_square') {
                    const greenerySquareAsset = assetCache['greenery_patch_square'];
                    if (greenerySquareAsset) {
                        ctx.drawImage(greenerySquareAsset,-obs.width / 2,-obs.height / 2,obs.width,obs.height);
                    } else {
                        ctx.fillStyle = '#2ECC40';
                        ctx.fillRect(-obs.width / 2,-obs.height / 2,obs.width,obs.height);
                    }
                } else if (obs.type === 'parked_car') {
                    // Draw tires first (underneath the car body)
                    const tireWidth = 7;
                    const tireHeight = 16;
                    const tireOffsetX = CAR_WIDTH / 2 - 8;
                    const tireOffsetY = CAR_HEIGHT / 2 - 24;

                    ctx.fillStyle = '#000000';

                    // Front left tire
                    ctx.fillRect(-tireOffsetX - tireWidth / 2,-tireOffsetY - tireHeight / 2,tireWidth,tireHeight);

                    // Front right tire
                    ctx.fillRect(tireOffsetX - tireWidth / 2,-tireOffsetY - tireHeight / 2,tireWidth,tireHeight);

                    // Rear left tire
                    ctx.fillRect(-tireOffsetX - tireWidth / 2,tireOffsetY - tireHeight / 2,tireWidth,tireHeight);

                    // Rear right tire
                    ctx.fillRect(tireOffsetX - tireWidth / 2,tireOffsetY - tireHeight / 2,tireWidth,tireHeight);

                    // Draw car body on top of tires
                    const carAsset = assetCache[obs.assetId];
                    if (carAsset && carAsset.complete && carAsset.naturalWidth > 0) {
                        ctx.drawImage(carAsset,-CAR_WIDTH / 2,-CAR_HEIGHT / 2,CAR_WIDTH,CAR_HEIGHT);
                    } else {
                        // Draw fallback car body
                        const carColors = {
                            'parked_car_yellow': '#FFD600',
                            'parked_car_green': '#00E676',
                            'parked_car_purple': '#9C27B0',
                            'parked_car_white': '#EEEEEE'
                        };
                        const carColor = carColors[obs.assetId] || '#888888';

                        // Car body
                        ctx.fillStyle = carColor;
                        ctx.beginPath();
                        ctx.roundRect(-CAR_WIDTH / 2,-CAR_HEIGHT / 2,CAR_WIDTH,CAR_HEIGHT,8);
                        ctx.fill();

                        // Windshield
                        ctx.fillStyle = 'rgba(100,180,255,0.7)';
                        ctx.fillRect(-CAR_WIDTH / 2 + 10,-CAR_HEIGHT / 2 + 15,CAR_WIDTH - 20,25);

                        // Rear window
                        ctx.fillRect(-CAR_WIDTH / 2 + 10,CAR_HEIGHT / 2 - 35,CAR_WIDTH - 20,20);
                    }
                }

                if (currentMode === 'edit' && selectedObjectType === 'obstacle' && selectedObjectIndex === i) {
                    ctx.strokeStyle = '#2196F3';
                    ctx.lineWidth = 4;
                    ctx.strokeRect(-obs.width / 2 - 5,-obs.height / 2 - 5,obs.width + 10,obs.height + 10);

                    ctx.fillStyle = '#2196F3';
                    ctx.fillRect(obs.width / 2 - 10,-10,20,20);
                    ctx.fillRect(-10,obs.height / 2 - 10,20,20);
                }

                ctx.restore();
            }

            // Render player car (visible for 1 second after crash before disappearing)
            if (!hideCrashedCar) {
                ctx.save();
                ctx.translate(playerX,playerY);
                ctx.rotate(playerRotation * Math.PI / 180);

                // Draw tires first (underneath the car body)
                const tireWidth = 7;
                const tireHeight = 16;
                const tireOffsetX = CAR_WIDTH / 2 - 8; // Distance from edge
                const tireOffsetY = CAR_HEIGHT / 2 - 24; // Distance from top/bottom

                ctx.fillStyle = '#000000';

                // Front left tire (with steering rotation)
                ctx.save();
                ctx.translate(-tireOffsetX,-tireOffsetY);
                ctx.rotate(frontWheelAngle * Math.PI / 180);
                ctx.fillRect(-tireWidth / 2,-tireHeight / 2,tireWidth,tireHeight);
                ctx.restore();

                // Front right tire (with steering rotation)
                ctx.save();
                ctx.translate(tireOffsetX,-tireOffsetY);
                ctx.rotate(frontWheelAngle * Math.PI / 180);
                ctx.fillRect(-tireWidth / 2,-tireHeight / 2,tireWidth,tireHeight);
                ctx.restore();

                // Rear left tire (no rotation)
                ctx.fillRect(-tireOffsetX - tireWidth / 2,tireOffsetY - tireHeight / 2,tireWidth,tireHeight);

                // Rear right tire (no rotation)
                ctx.fillRect(tireOffsetX - tireWidth / 2,tireOffsetY - tireHeight / 2,tireWidth,tireHeight);

                // Draw car body on top of tires
                const playerCar = assetCache['player_car'];
                if (playerCar && playerCar.complete && playerCar.naturalWidth > 0) {
                    ctx.drawImage(playerCar,-CAR_WIDTH / 2,-CAR_HEIGHT / 2,CAR_WIDTH,CAR_HEIGHT);
                } else {
                    // Draw fallback player car (red sports car style)
                    ctx.fillStyle = '#E53935';
                    ctx.beginPath();
                    ctx.roundRect(-CAR_WIDTH / 2,-CAR_HEIGHT / 2,CAR_WIDTH,CAR_HEIGHT,10);
                    ctx.fill();

                    // Car roof / cabin
                    ctx.fillStyle = '#B71C1C';
                    ctx.beginPath();
                    ctx.roundRect(-CAR_WIDTH / 2 + 8,-CAR_HEIGHT / 2 + 30,CAR_WIDTH - 16,50,6);
                    ctx.fill();

                    // Windshield
                    ctx.fillStyle = 'rgba(100,180,255,0.8)';
                    ctx.fillRect(-CAR_WIDTH / 2 + 12,-CAR_HEIGHT / 2 + 18,CAR_WIDTH - 24,20);

                    // Rear window
                    ctx.fillRect(-CAR_WIDTH / 2 + 12,CAR_HEIGHT / 2 - 38,CAR_WIDTH - 24,18);

                    // Headlights
                    ctx.fillStyle = '#FFEB3B';
                    ctx.beginPath();
                    ctx.arc(-CAR_WIDTH / 2 + 15,-CAR_HEIGHT / 2 + 10,6,0,Math.PI * 2);
                    ctx.arc(CAR_WIDTH / 2 - 15,-CAR_HEIGHT / 2 + 10,6,0,Math.PI * 2);
                    ctx.fill();

                    // Taillights
                    ctx.fillStyle = '#FF5722';
                    ctx.beginPath();
                    ctx.arc(-CAR_WIDTH / 2 + 15,CAR_HEIGHT / 2 - 10,5,0,Math.PI * 2);
                    ctx.arc(CAR_WIDTH / 2 - 15,CAR_HEIGHT / 2 - 10,5,0,Math.PI * 2);
                    ctx.fill();
                }

                ctx.restore();
            }

            for (let deco of level.decorations) {
                if (deco.type === 'tree' && assetCache['tree_small']) {
                    ctx.save();
                    ctx.translate(deco.x,deco.y);
                    ctx.rotate(deco.rotation * Math.PI / 180);

                    const img = assetCache['tree_small'];
                    ctx.drawImage(img,-deco.width / 2,-deco.height / 2,deco.width,deco.height);
                } else if (deco.type === 'lamp_post' && assetCache['lamp_post']) {
                    ctx.save();
                    ctx.translate(deco.x,deco.y);
                    ctx.rotate(deco.rotation * Math.PI / 180);

                    const img = assetCache['lamp_post'];
                    ctx.drawImage(img,-20,-40,40,80);
                } else if (deco.type === 'flower_bed' && assetCache['flower_bed']) {
                    ctx.save();
                    ctx.translate(deco.x,deco.y);
                    ctx.rotate(deco.rotation * Math.PI / 180);

                    const img = assetCache['flower_bed'];
                    ctx.drawImage(img,-30,-30,60,60);
                }

                ctx.restore();
            }

            if (currentMode === 'edit') {
                for (let i = 0; i < level.decorations.length; i++) {
                    const deco = level.decorations[i];
                    if (selectedObjectType === 'decoration' && selectedObjectIndex === i) {
                        ctx.save();
                        ctx.translate(deco.x,deco.y);
                        ctx.rotate(deco.rotation * Math.PI / 180);

                        ctx.strokeStyle = '#2196F3';
                        ctx.lineWidth = 4;

                        if (deco.type === 'road_line_dashed' || deco.type === 'road_line_solid') {
                            ctx.strokeRect(-deco.length / 2 - 10,-15,deco.length + 20,30);
                        } else if (deco.type === 'park_spot') {
                            ctx.strokeRect(-deco.width / 2 - 5,-deco.height / 2 - 5,deco.width + 10,deco.height + 10);
                        } else if (deco.type === 'tree') {
                            const w = deco.width || 80;
                            const h = deco.height || 100;
                            ctx.strokeRect(-w / 2 - 5,-h / 2 - 5,w + 10,h + 10);
                        } else {
                            ctx.strokeRect(-35,-35,70,70);
                        }

                        ctx.restore();
                    }
                }
            }
        }

        let lastTime = 0;
        function gameLoop(timestamp) {
            const deltaTime = Math.min((timestamp - lastTime) / 1000,0.1);
            lastTime = timestamp;

            if (currentMode === 'play' && gameRunning && timerStarted && !levelComplete && !crashed && !gamePaused) {
                gameTimer += deltaTime;
                uiElements.timerDisplay.textContent = Math.floor(gameTimer);
            }

            if (currentMode === 'play' && gameRunning) {
                updatePhysics(deltaTime);
            }

            render();
            requestAnimationFrame(gameLoop);
        }

        /**
         * Resume AudioContext for iOS (required after user interaction)
         */
        function resumeAudioContext() {
            if (isIOS && WebAudioSound.sharedContext) {
                if (WebAudioSound.sharedContext.state === 'suspended') {
                    WebAudioSound.sharedContext.resume();
                }
            }
        }

                }
