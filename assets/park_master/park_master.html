            // Direction control buttons
            const upBtn = document.getElementById('upBtn');
            const downBtn = document.getElementById('downBtn');
            const leftBtn = document.getElementById('leftBtn');
            const rightBtn = document.getElementById('rightBtn');

            // Track button pressed state - uses CSS :active pseudo-class check
            const buttonKeyMap = {
                'upBtn': 'w',
                'downBtn': 's',
                'leftBtn': 'a',
                'rightBtn': 'd'
            };

            // Polling approach - check if buttons are being pressed via CSS matches
            let pollInterval = null;

            function startPolling() {
                if (pollInterval) return;

                pollInterval = setInterval(() => {
                    // Check each button's pressed state via class
                    const upPressed = upBtn?.classList.contains('pressed');
                    const downPressed = downBtn?.classList.contains('pressed');
                    const leftPressed = leftBtn?.classList.contains('pressed');
                    const rightPressed = rightBtn?.classList.contains('pressed');

                    keys['w'] = upPressed || keys['ArrowUp'] || keys['W'];
                    keys['s'] = downPressed || keys['ArrowDown'] || keys['S'];
                    keys['a'] = leftPressed || keys['ArrowLeft'] || keys['A'];
                    keys['d'] = rightPressed || keys['ArrowRight'] || keys['D'];
                },16); // ~60fps
            }

            startPolling();

            // Setup touch/pointer handlers for buttons
            function setupButtonHandlers(btn,key) {
                if (!btn) return;

                let isHolding = false;
                let holdInterval = null;

                const startHold = (e) => {
                    e.preventDefault();
                    e.stopPropagation();

                    if (!isHolding) {
                        isHolding = true;
                        btn.classList.add('pressed');
                        keys[key] = true;

                        // Start timer if needed
                        if (!timerStarted) {
                            timerStarted = true;
                            hideStartIndicator();
                        }
                        resumeAudioContext();

                        // Keep key pressed while holding
                        holdInterval = setInterval(() => {
                            keys[key] = true;
                        },16);

                        console.log('Hold START:',key);
                    }
                };

                const endHold = (e) => {
                    if (e) {
                        e.preventDefault();
                        e.stopPropagation();
                    }

                    if (isHolding) {
                        isHolding = false;
                        btn.classList.remove('pressed');
                        keys[key] = false;

                        if (holdInterval) {
                            clearInterval(holdInterval);
                            holdInterval = null;
                        }

                        console.log('Hold END:',key);
                    }
                };

                // Pointer events (works on both touch and mouse)
                btn.addEventListener('pointerdown',startHold,{ passive: false });
                btn.addEventListener('pointerup',endHold,{ passive: false });
                btn.addEventListener('pointercancel',endHold,{ passive: false });
                btn.addEventListener('pointerleave',endHold,{ passive: false });

                // Fallback touch events
                btn.addEventListener('touchstart',startHold,{ passive: false });
                btn.addEventListener('touchend',endHold,{ passive: false });
                btn.addEventListener('touchcancel',endHold,{ passive: false });

                // Mouse events
                btn.addEventListener('mousedown',startHold,{ passive: false });
                btn.addEventListener('mouseup',endHold,{ passive: false });
                btn.addEventListener('mouseleave',endHold,{ passive: false });

                // Prevent context menu
                btn.addEventListener('contextmenu',(e) => e.preventDefault());
            }

            // Setup all buttons
            setupButtonHandlers(upBtn,'w');
            setupButtonHandlers(downBtn,'s');
            setupButtonHandlers(leftBtn,'a');
            setupButtonHandlers(rightBtn,'d');

            canvas.addEventListener('mousedown',handleCanvasMouseDown);
            canvas.addEventListener('mousemove',handleCanvasMouseMove);
            canvas.addEventListener('mouseup',handleCanvasMouseUp);
            canvas.addEventListener('touchstart',handleCanvasTouchStart);
            canvas.addEventListener('touchmove',handleCanvasTouchMove);
            canvas.addEventListener('touchend',handleCanvasTouchEnd);
        }

        function handleCanvasMouseDown(e) {
            if (currentMode !== 'edit') return;

            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (canvas.width / rect.width);
            const y = (e.clientY - rect.top) * (canvas.height / rect.height);

            handleEditClick(x,y);
        }

        function handleCanvasMouseMove(e) {
            if (currentMode !== 'edit' || !draggingObject) return;

            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (canvas.width / rect.width);
            const y = (e.clientY - rect.top) * (canvas.height / rect.height);

            handleEditDrag(x,y);
        }

        function handleCanvasMouseUp(e) {
            if (currentMode !== 'edit') return;
            draggingObject = false;
        }

        function handleCanvasTouchStart(e) {
            resumeAudioContext(); // Resume AudioContext on iOS
            if (currentMode !== 'edit') return;
            e.preventDefault();

            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const x = (touch.clientX - rect.left) * (canvas.width / rect.width);
            const y = (touch.clientY - rect.top) * (canvas.height / rect.height);

            handleEditClick(x,y);
        }

        function handleCanvasTouchMove(e) {
            if (currentMode !== 'edit' || !draggingObject) return;
            e.preventDefault();

            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const x = (touch.clientX - rect.left) * (canvas.width / rect.width);
            const y = (touch.clientY - rect.top) * (canvas.height / rect.height);

            handleEditDrag(x,y);
        }

        function handleCanvasTouchEnd(e) {
            if (currentMode !== 'edit') return;
            e.preventDefault();
            draggingObject = false;
        }

        function handleEditClick(x,y) {
            const level = getCurrentLevel();

            if (paletteSelection) {
                const newObj = createObjectFromPalette(paletteSelection,x,y);
                if (newObj.isObstacle) {
                    level.obstacles.push(newObj.data);
                    selectedObjectType = 'obstacle';
                    selectedObjectIndex = level.obstacles.length - 1;
                } else {
                    level.decorations.push(newObj.data);
                    selectedObjectType = 'decoration';
                    selectedObjectIndex = level.decorations.length - 1;
                }
                paletteSelection = null;
                updatePaletteUI();
                showEditMenu();
                showToast('Object placed!',1500);
                return;
            }

            for (let i = level.obstacles.length - 1; i >= 0; i--) {
                const obs = level.obstacles[i];
                if (pointInRotatedRect(x,y,obs.x,obs.y,obs.width,obs.height,obs.rotation)) {
                    selectedObjectType = 'obstacle';
                    selectedObjectIndex = i;
                    selectedObject = obs;
                    draggingObject = true;
                    dragOffsetX = x - obs.x;
                    dragOffsetY = y - obs.y;
                    showEditMenu();
                    return;
                }
            }

            for (let i = level.decorations.length - 1; i >= 0; i--) {
                const deco = level.decorations[i];
                let size;
                if (deco.type === 'road_line_dashed' || deco.type === 'road_line_solid') {
                    size = { w: deco.length,h: 30 };
                } else if (deco.type === 'park_spot') {
                    size = { w: deco.width,h: deco.height };
                } else if (deco.type === 'tree') {
                    size = { w: deco.width || 80,h: deco.height || 100 };
                } else {
                    size = { w: 70,h: 70 };
                }
                if (pointInRotatedRect(x,y,deco.x,deco.y,size.w,size.h,deco.rotation)) {
                    selectedObjectType = 'decoration';
                    selectedObjectIndex = i;
                    selectedObject = deco;
                    draggingObject = true;
                    dragOffsetX = x - deco.x;
                    dragOffsetY = y - deco.y;
                    showEditMenu();
                    return;
                }
            }

            selectedObject = null;
            selectedObjectType = null;
            selectedObjectIndex = -1;
            lib.editMenu.close();
        }

        function handleEditDrag(x,y) {
            if (!selectedObject) return;

            selectedObject.x = snapToGrid(x - dragOffsetX);
            selectedObject.y = snapToGrid(y - dragOffsetY);
        }

        function createObjectFromPalette(type,x,y) {
            const snappedX = snapToGrid(x);
            const snappedY = snapToGrid(y);

            const objectTypes = {
                'barrier': {
                    isObstacle: true,
                    data: { type: 'barrier',x: snappedX,y: snappedY,width: 100,height: 40,rotation: 0 }
                },
                'greenery': {
                    isObstacle: true,
                    data: { type: 'greenery',x: snappedX,y: snappedY,width: 240,height: 120,rotation: 0 }
                },
                'greenery_square': {
                    isObstacle: true,
                    data: { type: 'greenery_square',x: snappedX,y: snappedY,width: 100,height: 100,rotation: 0 }
                },
                'parked_car_yellow': {
                    isObstacle: true,
                    data: { type: 'parked_car',assetId: 'parked_car_yellow',x: snappedX,y: snappedY,width: CAR_WIDTH,height: CAR_HEIGHT,rotation: 0,canMove: false,targetX: snappedX,targetY: snappedY,startDelay: 0,moveSpeed: 50,moveLoopInterval: 2 }
                },
                'parked_car_green': {
                    isObstacle: true,
                    data: { type: 'parked_car',assetId: 'parked_car_green',x: snappedX,y: snappedY,width: CAR_WIDTH,height: CAR_HEIGHT,rotation: 0,canMove: false,targetX: snappedX,targetY: snappedY,startDelay: 0,moveSpeed: 50,moveLoopInterval: 2 }
                },
                'parked_car_purple': {
                    isObstacle: true,
                    data: { type: 'parked_car',assetId: 'parked_car_purple',x: snappedX,y: snappedY,width: CAR_WIDTH,height: CAR_HEIGHT,rotation: 0,canMove: false,targetX: snappedX,targetY: snappedY,startDelay: 0,moveSpeed: 50,moveLoopInterval: 2 }
                },
                'parked_car_white': {
                    isObstacle: true,
                    data: { type: 'parked_car',assetId: 'parked_car_white',x: snappedX,y: snappedY,width: CAR_WIDTH,height: CAR_HEIGHT,rotation: 0,canMove: false,targetX: snappedX,targetY: snappedY,startDelay: 0,moveSpeed: 50,moveLoopInterval: 2 }
                },
                'road_line_dashed': {
                    isObstacle: false,
                    data: { type: 'road_line_dashed',x: snappedX,y: snappedY,length: 200,rotation: 0 }
                },
                'road_line_solid': {
                    isObstacle: false,
                    data: { type: 'road_line_solid',x: snappedX,y: snappedY,length: 200,rotation: 0 }
                },
                'park_spot': {
                    isObstacle: false,
                    data: { type: 'park_spot',x: snappedX,y: snappedY,width: 160,height: 100,rotation: 0 }
                },
                'tree': {
                    isObstacle: false,
                    data: { type: 'tree',x: snappedX,y: snappedY,rotation: 0,width: 80,height: 100 }
                },
                'lamp_post': {
                    isObstacle: false,
                    data: { type: 'lamp_post',x: snappedX,y: snappedY,rotation: 0 }
                },
                'flower_bed': {
                    isObstacle: false,
                    data: { type: 'flower_bed',x: snappedX,y: snappedY,rotation: 0 }
                }
            };

            return objectTypes[type];
        }

        function showEditMenu() {
            if (!selectedObject) {
                lib.editMenu.close();
                return;
            }

            const params = {
                'X Position': {
                    key: selectedObjectType === 'obstacle' ?
                        `gameConfig.levels.${window.gameConfig.currentLevel}.obstacles.${selectedObjectIndex}.x` :
                        `gameConfig.levels.${window.gameConfig.currentLevel}.decorations.${selectedObjectIndex}.x`,
                    type: 'slider',
                    min: -CAR_WIDTH,
                    max: 720 + CAR_WIDTH,
                    step: 5,
                    onChange: (value) => {
                        selectedObject.x = value;
                    }
                },
                'Y Position': {
                    key: selectedObjectType === 'obstacle' ?
                        `gameConfig.levels.${window.gameConfig.currentLevel}.obstacles.${selectedObjectIndex}.y` :
                        `gameConfig.levels.${window.gameConfig.currentLevel}.decorations.${selectedObjectIndex}.y`,
                    type: 'slider',
                    min: -CAR_HEIGHT,
                    max: 1280 + CAR_HEIGHT,
                    step: 5,
                    onChange: (value) => {
                        selectedObject.y = value;
                    }
                },
                'Rotation': {
                    key: selectedObjectType === 'obstacle' ?
                        `gameConfig.levels.${window.gameConfig.currentLevel}.obstacles.${selectedObjectIndex}.rotation` :
                        `gameConfig.levels.${window.gameConfig.currentLevel}.decorations.${selectedObjectIndex}.rotation`,
                    type: 'slider',
                    min: 0,
                    max: 360,
                    step: 10,
                    onChange: (value) => {
                        selectedObject.rotation = value;
                    }
                }
            };

            if (selectedObject.width !== undefined) {
                params['Width'] = {
                    key: selectedObjectType === 'obstacle' ?
                        `gameConfig.levels.${window.gameConfig.currentLevel}.obstacles.${selectedObjectIndex}.width` :
                        `gameConfig.levels.${window.gameConfig.currentLevel}.decorations.${selectedObjectIndex}.width`,
                    type: 'slider',
                    min: 10,
                    max: 400,
                    step: 10,
                    onChange: (value) => {
                        selectedObject.width = value;
                    }
                };
            }

            if (selectedObject.height !== undefined) {
                params['Height'] = {
                    key: selectedObjectType === 'obstacle' ?
                        `gameConfig.levels.${window.gameConfig.currentLevel}.obstacles.${selectedObjectIndex}.height` :
                        `gameConfig.levels.${window.gameConfig.currentLevel}.decorations.${selectedObjectIndex}.height`,
                    type: 'slider',
                    min: 10,
                    max: 400,
                    step: 10,
                    onChange: (value) => {
                        selectedObject.height = value;
                    }
                };
            }

            if (selectedObject.length !== undefined) {
                params['Length'] = {
                    key: `gameConfig.levels.${window.gameConfig.currentLevel}.decorations.${selectedObjectIndex}.length`,
                    type: 'slider',
                    min: 80,
                    max: 800,
                    step: 10,
                    onChange: (value) => {
                        selectedObject.length = value;
                    }
                };
            }

            // Add movement properties for parked cars
            if (selectedObject.type === 'parked_car' && selectedObjectType === 'obstacle') {
                // Ensure default values exist
                if (selectedObject.canMove === undefined) selectedObject.canMove = false;
                if (selectedObject.targetX === undefined) selectedObject.targetX = selectedObject.x;
                if (selectedObject.targetY === undefined) selectedObject.targetY = selectedObject.y;
                if (selectedObject.startDelay === undefined) selectedObject.startDelay = 0;
                if (selectedObject.moveSpeed === undefined) selectedObject.moveSpeed = 100;
                if (selectedObject.moveLoopInterval === undefined) selectedObject.moveLoopInterval = 5;

                params['Can Move'] = {
                    key: `gameConfig.levels.${window.gameConfig.currentLevel}.obstacles.${selectedObjectIndex}.canMove`,
                    type: 'checkbox',
                    onChange: (value) => {
                        selectedObject.canMove = value;
                    }
                };

                params['Target X'] = {
                    key: `gameConfig.levels.${window.gameConfig.currentLevel}.obstacles.${selectedObjectIndex}.targetX`,
                    type: 'slider',
                    min: -CAR_WIDTH,
                    max: 720 + CAR_WIDTH,
                    step: 5,
                    onChange: (value) => {
                        selectedObject.targetX = value;
                    }
                };

                params['Target Y'] = {
                    key: `gameConfig.levels.${window.gameConfig.currentLevel}.obstacles.${selectedObjectIndex}.targetY`,
                    type: 'slider',
                    min: -CAR_HEIGHT,
                    max: 1280 + CAR_HEIGHT,
                    step: 5,
                    onChange: (value) => {
                        selectedObject.targetY = value;
                    }
                };

                params['Start Delay'] = {
                    key: `gameConfig.levels.${window.gameConfig.currentLevel}.obstacles.${selectedObjectIndex}.startDelay`,
                    type: 'slider',
                    min: 0,
                    max: 60,
                    step: 1,
                    onChange: (value) => {
                        selectedObject.startDelay = value;
                    }
                };

                params['Move Speed'] = {
                    key: `gameConfig.levels.${window.gameConfig.currentLevel}.obstacles.${selectedObjectIndex}.moveSpeed`,
                    type: 'slider',
                    min: 50,
                    max: 500,
                    step: 50,
                    onChange: (value) => {
                        selectedObject.moveSpeed = value;
                    }
                };

                params['Loop Interval'] = {
                    key: `gameConfig.levels.${window.gameConfig.currentLevel}.obstacles.${selectedObjectIndex}.moveLoopInterval`,
                    type: 'slider',
                    min: 1,
                    max: 60,
                    step: 1,
                    onChange: (value) => {
                        selectedObject.moveLoopInterval = value;
                    }
                };
            }

            lib.editMenu.open({
                name: selectedObject.type.replace('_',' ').toUpperCase(),
                params: params,
                onCopy: () => {
                    const level = getCurrentLevel();
                    const copy = JSON.parse(JSON.stringify(selectedObject));
                    copy.x += 40;
                    copy.y += 40;

                    if (selectedObjectType === 'obstacle') {
                        level.obstacles.push(copy);
                        selectedObjectIndex = level.obstacles.length - 1;
                    } else {
                        level.decorations.push(copy);
                        selectedObjectIndex = level.decorations.length - 1;
                    }
                    selectedObject = copy;
                    showEditMenu();
                    showToast('Object copied!',1500);
                },
                onDelete: () => {
                    const level = getCurrentLevel();
                    if (selectedObjectType === 'obstacle') {
                        level.obstacles.splice(selectedObjectIndex,1);
                    } else {
                        level.decorations.splice(selectedObjectIndex,1);
                    }
                    selectedObject = null;
                    selectedObjectType = null;
                    selectedObjectIndex = -1;
                    lib.editMenu.close();
                    showToast('Object deleted!',1500);
                }
            });
        }

        async function run(mode) {
            lib.log('run() called. Mode: ' + mode);

            currentMode = mode;

            // Load user progress in play mode
            if (mode === 'play') {
                const progress = await loadUserProgress();
                if (progress && progress.currentLevel !== undefined) {
                    // Restore the player's current level
                    window.gameConfig.currentLevel = progress.currentLevel;
                    lib.log('Loaded progress: Level ' + (progress.currentLevel + 1));
                }
            }

            preloadAssets([
                'player_car','parked_car_yellow','parked_car_green','parked_car_purple','parked_car_white',
                'greenery_patch','greenery_patch_square','tree_small','lamp_post','flower_bed',
                'barrier_obstacle','park_spot_marker',
                'engine_sound','crash_sound','success_sound','star_rating_sound','background_music'
            ],() => {
                // Generate pixel masks after all images are loaded
                generateCarPixelMasks();
                // Generate pixel masks for obstacles in this level
                generateObstaclePixelMasks();
                lib.log('Pixel masks generated successfully');
            });

            engineAudio = assetCache['engine_sound'];
            backgroundMusic = assetCache['background_music'];

            // Helper function to get parked car dropdown options
            function getParkedCarOptions() {
                const level = getCurrentLevel();
                const parkedCars = [{ label: 'None',value: -1 }];

                // Guard against null level or missing obstacles
                if (!level || !level.obstacles || !Array.isArray(level.obstacles)) {
                    lib.log('getParkedCarOptions: No valid level or obstacles found');
                    return parkedCars;
                }

                level.obstacles.forEach((obstacle,index) => {
                    if (obstacle.type === 'parked_car') {
                        const carColor = obstacle.assetId ? obstacle.assetId.replace('parked_car_','') : 'unknown';
                        parkedCars.push({
                            label: `Parked Car ${index + 1} (${carColor})`,
                            value: index
                        });
                    }
                });

                return parkedCars;
            }

            // Setup game parameters panel
            function setupGameParameters() {
                lib.showGameParameters({
                    name: 'Game Settings',
                    params: {
                        'Max Speed': {
                            key: 'gameConfig.settings.maxSpeed',
                            type: 'slider',
                            min: 100,
                            max: 400,
                            step: 10,
                            onChange: (value) => {
                                window.gameConfig.settings.maxSpeed = value;
                                MAX_SPEED = value;
                                MAX_REVERSE_SPEED = value / 2;
                            }
                        },
                        'Acceleration': {
                            key: 'gameConfig.settings.acceleration',
                            type: 'slider',
                            min: 50,
                            max: 300,
                            step: 10,
                            onChange: (value) => {
                                window.gameConfig.settings.acceleration = value;
                                ACCELERATION = value;
                                REVERSE_ACCELERATION = value / 2;
                            }
                        },
                        'Turn Speed': {
                            key: 'gameConfig.settings.turnSpeed',
                            type: 'slider',
                            min: 90,
                            max: 360,
                            step: 10,
                            onChange: (value) => {
                                window.gameConfig.settings.turnSpeed = value;
                            }
                        },
                        'Current Level': {
                            key: 'gameConfig.currentLevel',
                            type: 'dropdown',
                            options: [
                                { label: 'Level 1',value: 0 },
                                { label: 'Level 2',value: 1 },
                                { label: 'Level 3',value: 2 },
                                { label: 'Level 4',value: 3 },
                                { label: 'Level 5',value: 4 },
                                { label: 'Level 6',value: 5 },
                                { label: 'Level 7',value: 6 },
                                { label: 'Level 8',value: 7 },
                                { label: 'Level 9',value: 8 },
                                { label: 'Level 10',value: 9 }
                            ],
                            onChange: (value) => {
                                window.gameConfig.currentLevel = Number(value);
                                //initializePlayer();

                                const level = getCurrentLevel();
                                playerX = level.playerStart.x;
                                playerY = level.playerStart.y;
                                playerRotation = level.playerStart.rotation;

                                updateLevelUI();

                                setupGameParameters();

                                selectedObject = null;
                                selectedObjectType = null;
                                selectedObjectIndex = -1;
                                lib.editMenu.close();
                            }
                        },
                        'Select Parked Car': {
                            key: 'temp.selectedParkedCar',
                            type: 'dropdown',
                            options: getParkedCarOptions(),
                            onChange: (value) => {
                                const carIndex = Number(value);
                                if (carIndex >= 0) {
                                    const level = getCurrentLevel();
                                    const obstacle = level.obstacles[carIndex];

                                    if (obstacle && obstacle.type === 'parked_car') {
                                        // Select this car as if it was clicked
                                        selectedObjectType = 'obstacle';
                                        selectedObjectIndex = carIndex;
                                        selectedObject = obstacle;
                                        showEditMenu();
                                        //console.log('Selected parked car:', carIndex);
                                    }
                                }
                            }
                        },
                        'Player Start X': {
                            key: `gameConfig.levels.${window.gameConfig.currentLevel}.playerStart.x`,
                            type: 'slider',
                            min: 0,
                            max: 720,
                            step: 5,
                            onChange: (value) => {
                                const level = getCurrentLevel();
                                level.playerStart.x = value;
                                if (currentMode === 'edit') {
                                    playerX = value;
                                }
                            }
                        },
                        'Player Start Y': {
                            key: `gameConfig.levels.${window.gameConfig.currentLevel}.playerStart.y`,
                            type: 'slider',
                            min: 0,
                            max: 1280,
                            step: 5,
                            onChange: (value) => {
                                const level = getCurrentLevel();
                                level.playerStart.y = value;
                                if (currentMode === 'edit') {
                                    playerY = value;
                                }
                            }
                        },
                        'Player Start Rotation': {
                            key: `gameConfig.levels.${window.gameConfig.currentLevel}.playerStart.rotation`,
                            type: 'slider',
                            min: 0,
                            max: 360,
                            step: 5,
                            onChange: (value) => {
                                const level = getCurrentLevel();
                                level.playerStart.rotation = value;
                                if (currentMode === 'edit') {
                                    playerRotation = value;
                                }
                            }
                        }
                    }
                });
            }

            setupGameParameters();

            setupInputHandlers();
            initializePlayer();

            if (mode === 'play') {
                gameRunning = true;
                gamePaused = false;
                uiElements.editDrawer.classList.remove('show');
                uiElements.modalBackdrop.classList.remove('show');
                uiElements.pauseModal.classList.remove('show');

                // Remove edit-mode class from status-bar
                document.querySelector('.status-bar').classList.remove('edit-mode');

                // Show pause icon, hide menu icon
                uiElements.menuIcon.style.display = 'none';
                uiElements.pauseIcon.style.display = 'flex';

                // Show timer in play mode
                document.querySelector('.timer-display').style.display = 'flex';

                // Show direction control buttons
                document.getElementById('directionControls').style.display = 'flex';

                if (backgroundMusic) {
                    backgroundMusic.currentTime = 0;
                    backgroundMusic.play();
                }

                if (engineAudio) {
                    engineAudio.currentTime = 0;
                    engineAudio.play();
                }

                MAX_SPEED = window.gameConfig.settings.maxSpeed;
                MAX_REVERSE_SPEED = MAX_SPEED / 2;
                ACCELERATION = window.gameConfig.settings.acceleration;
                REVERSE_ACCELERATION = ACCELERATION / 2;
            } else {
                gameRunning = false;
                gamePaused = false;
                setupEditPalette();

                // Add edit-mode class to status-bar
                document.querySelector('.status-bar').classList.add('edit-mode');

                // Show menu icon, hide pause icon
                uiElements.menuIcon.style.display = 'flex';
                uiElements.pauseIcon.style.display = 'none';

                // Hide timer in edit mode
                document.querySelector('.timer-display').style.display = 'none';

                // Hide direction control buttons
                document.getElementById('directionControls').style.display = 'none';

                if (engineAudio) engineAudio.pause();
                if (backgroundMusic) backgroundMusic.pause();
            }

            lastTime = performance.now();
            requestAnimationFrame(gameLoop);

        }

        // Auto-start game when page loads (for Flutter WebView)
        (function autoStartGame() {
            // Wait for DOM ready
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded',initGame);
            } else {
                initGame();
            }

            function initGame() {
                // Load assetsMap from script tag if available
                try {
                    const assetsMapScript = document.getElementById('assetsMap');
                    if (assetsMapScript && assetsMapScript.textContent.trim()) {
                        window.assetMap = JSON.parse(assetsMapScript.textContent);
                        console.log('Loaded assetMap from script tag');
                    }
                } catch (e) {
                    console.log('No assetMap in script tag or parse error:',e);
                }

                // Load gameConfig from script tag if available
                try {
                    const configScript = document.getElementById('gameConfig');
                    if (configScript && configScript.textContent.trim() && !window.gameConfig) {
                        // Config is set via script execution, not JSON parse
                        console.log('gameConfig loaded from script tag');
                    }
                } catch (e) {
                    console.log('gameConfig parse error:',e);
                }

                // Small delay to ensure everything is ready then auto-start
                setTimeout(() => {
                    if (typeof run === 'function') {
                        run('play');
                        console.log('Game auto-started in play mode');
                    }
                },100);
            }
        })();

    </script>
