<!DOCTYPE html>
<html>

<head>
    <title>Quantum Link</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap"
        rel="stylesheet">
    <link rel="icon"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ccircle cx='8' cy='8' r='8' fill='%2300d9ff'/%3E%3C/svg%3E">

    <style>
        /* ===== CSS RESET & BASE ===== */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body,
        html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a0e27;
            font-family: 'Rajdhani', 'Segoe UI', sans-serif;
            color: #ffffff;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ===== CSS CUSTOM PROPERTIES ===== */
        :root {
            /* Colors */
            --color-primary: #00d9ff;
            --color-primary-glow: rgba(0, 217, 255, 0.5);
            --color-secondary: #ff006e;
            --color-success: #00ff88;
            --color-warning: #ff6b35;
            --color-bg: #0a0e27;
            --color-surface: rgba(255, 255, 255, 0.05);
            --color-border: rgba(0, 217, 255, 0.3);
            --color-text-primary: #ffffff;
            --color-text-secondary: rgba(255, 255, 255, 0.7);

            /* Spacing (8px grid) */
            --space-xs: 8px;
            --space-sm: 16px;
            --space-md: 24px;
            --space-lg: 32px;
            --space-xl: 48px;

            /* Animation */
            --transition-fast: 150ms;
            --transition-normal: 300ms;
            --transition-slow: 500ms;
            --ease-out: cubic-bezier(0.0, 0, 0.2, 1);
            --ease-bounce: cubic-bezier(0.68, -0.6, 0.32, 1.6);

            /* Shadows */
            --shadow-sm: 0 0 20px rgba(0, 217, 255, 0.2);
            --shadow-lg: 0 0 40px rgba(0, 217, 255, 0.3);
            --glow-primary: 0 0 30px var(--color-primary-glow);
            /* Expose safe-area insets so JS can respect device notch/home areas */
            --safe-left: env(safe-area-inset-left, 0px);
            --safe-right: env(safe-area-inset-right, 0px);
        }

        /* ===== GAME CANVAS ===== */
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
            cursor: pointer;
        }

        /* ===== UI OVERLAY CONTAINER ===== */
        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .ui-overlay>* {
            pointer-events: auto;
        }

        /* ===== SCORE DISPLAY ===== */
        .score-container {
            position: absolute;
            top: var(--space-sm);
            left: 50%;
            transform: translateX(-50%);
            background: var(--color-surface);
            backdrop-filter: blur(10px);
            border: 2px solid var(--color-border);
            border-radius: 8px;
            padding: var(--space-xs) var(--space-md);
            box-shadow: var(--shadow-sm);
            pointer-events: none;
        }

        .score-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            font-weight: 700;
            color: var(--color-text-secondary);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
            margin-bottom: 4px;
        }

        .score-display {
            font-family: 'Orbitron', sans-serif;
            font-size: 72px;
            font-weight: 900;
            color: var(--color-primary);
            text-shadow: var(--glow-primary);
            text-align: center;
            line-height: 1;
            transition: transform var(--transition-fast) var(--ease-bounce);
        }

        .score-display.bump {
            transform: scale(1.15);
        }

        /* ===== TIMER DISPLAY ===== */
        .timer-container {
            position: absolute;
            top: var(--space-sm);
            right: var(--space-sm);
            background: var(--color-surface);
            backdrop-filter: blur(10px);
            border: 2px solid var(--color-border);
            border-radius: 8px;
            padding: var(--space-xs) var(--space-sm);
            box-shadow: var(--shadow-sm);
            min-width: 120px;
            pointer-events: none;
            transition: all var(--transition-normal) var(--ease-out);
        }

        .timer-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            font-weight: 700;
            color: var(--color-text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
            margin-bottom: 4px;
        }

        .timer-display {
            font-family: 'Orbitron', sans-serif;
            font-size: 48px;
            font-weight: 900;
            color: var(--color-text-primary);
            text-shadow: 0 0 10px var(--color-primary);
            text-align: center;
            line-height: 1;
        }

        .timer-container.warning {
            border-color: var(--color-secondary);
            background: rgba(255, 0, 110, 0.1);
            animation: timerPulse 0.5s infinite;
        }

        .timer-container.warning .timer-display {
            color: var(--color-secondary);
            text-shadow: 0 0 20px var(--color-secondary);
        }

        @keyframes timerPulse {

            0%,
            100% {
                transform: scale(1);
                box-shadow: 0 0 20px rgba(255, 0, 110, 0.3);
            }

            50% {
                transform: scale(1.05);
                box-shadow: 0 0 40px rgba(255, 0, 110, 0.6);
            }
        }

        /* ===== COMBO DISPLAY ===== */
        .combo-container {
            position: absolute;
            top: 140px;
            left: 50%;
            transform: translateX(-50%);
            pointer-events: none;
        }

        .combo-display {
            font-family: 'Orbitron', sans-serif;
            font-size: 32px;
            font-weight: 900;
            color: #ffbe0b;
            text-shadow: 0 0 20px #ffbe0b;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0;
            transform: translateY(20px) scale(0.8);
            transition: all var(--transition-normal) var(--ease-out);
        }

        .combo-display.active {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        /* ===== PAUSE BUTTON ===== */
        .pause-button {
            position: absolute;
            top: var(--space-sm);
            left: var(--space-sm);
            width: 56px;
            height: 56px;
            background: var(--color-surface);
            backdrop-filter: blur(10px);
            border: 2px solid var(--color-border);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all var(--transition-fast) var(--ease-out);
            box-shadow: var(--shadow-sm);
        }

        /* Left controls container (pause + back) */
        .left-controls {
            position: absolute;
            top: var(--space-sm);
            left: var(--space-sm);
            display: flex;
            gap: 8px;
            align-items: center;
            z-index: 10;
        }

        /* When buttons are inside the container they should flow, not use absolute offsets */
        .left-controls .pause-button {
            position: relative;
            left: auto;
            top: auto;
        }

        /* Back button styling (match pause-button size) */
        .back-button {
            width: 56px;
            height: 56px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Music toggle positioned near the timer (top-right) */
        .music-button {
            left: auto;
            /* place to the left of the timer container (timer min-width ~120px + padding) */
            right: calc(var(--space-sm));
            /* top: var(--space-sm) + 200px; */
            top: 120px;
            transform: none;
            background: var(--color-surface);
        }

        .pause-button:hover {
            transform: scale(1.05);
            border-color: var(--color-primary);
            box-shadow: var(--shadow-lg);
        }

        .pause-button:active {
            transform: scale(0.95);
        }

        .pause-icon {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: var(--color-primary);
            stroke-width: 3;
            stroke-linecap: round;
        }

        /* ===== PAUSE OVERLAY ===== */
        .pause-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 14, 39, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--transition-normal) var(--ease-out);
        }

        .pause-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .pause-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 64px;
            font-weight: 900;
            color: var(--color-primary);
            text-shadow: var(--glow-primary);
            margin-bottom: var(--space-xl);
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        .pause-buttons {
            display: flex;
            flex-direction: column;
            gap: var(--space-md);
            width: 100%;
            max-width: 400px;
            padding: 0 var(--space-md);
        }

        /* ===== GAME OVER OVERLAY ===== */
        .game-over-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 14, 39, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--transition-slow) var(--ease-out);
        }

        .game-over-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .game-over-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 64px;
            font-weight: 900;
            color: var(--color-secondary);
            text-shadow: 0 0 40px var(--color-secondary);
            margin-bottom: var(--space-lg);
            text-transform: uppercase;
            letter-spacing: 4px;
            animation: gameOverPulse 2s infinite;
        }

        @keyframes gameOverPulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.7;
            }
        }

        .stats-container {
            background: var(--color-surface);
            backdrop-filter: blur(10px);
            border: 2px solid var(--color-border);
            border-radius: 8px;
            padding: var(--space-lg);
            margin-bottom: var(--space-xl);
            box-shadow: var(--shadow-lg);
            min-width: 400px;
        }

        .final-score {
            font-family: 'Orbitron', sans-serif;
            font-size: 48px;
            font-weight: 700;
            color: var(--color-text-primary);
            text-align: center;
            margin-bottom: var(--space-md);
        }

        .final-score-value {
            font-size: 72px;
            color: var(--color-primary);
            text-shadow: var(--glow-primary);
        }

        .best-combo {
            font-family: 'Orbitron', sans-serif;
            font-size: 32px;
            font-weight: 600;
            color: var(--color-text-secondary);
            text-align: center;
        }

        .best-combo-value {
            color: #ffbe0b;
            text-shadow: 0 0 20px #ffbe0b;
        }

        /* ===== BUTTONS ===== */
        .btn {
            padding: 20px 60px;
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            font-weight: 700;
            color: var(--color-bg);
            background: linear-gradient(135deg, var(--color-primary), var(--color-success));
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: var(--glow-primary);
            transition: all var(--transition-fast) var(--ease-out);
            min-width: 280px;
            text-align: center;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 50px var(--color-primary-glow);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-secondary {
            background: var(--color-surface);
            color: var(--color-text-primary);
            border: 2px solid var(--color-border);
            box-shadow: var(--shadow-sm);
        }

        .btn-secondary:hover {
            border-color: var(--color-primary);
            box-shadow: var(--shadow-lg);
        }

        /* ===== KEYBOARD HINTS ===== */
        .keyboard-hints {
            position: absolute;
            bottom: var(--space-md);
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: var(--space-md);
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--transition-normal) var(--ease-out);
        }

        .keyboard-hints.visible {
            opacity: 0.6;
        }

        .keyboard-hint {
            background: var(--color-surface);
            backdrop-filter: blur(10px);
            border: 2px solid var(--color-border);
            border-radius: 6px;
            padding: var(--space-xs) var(--space-sm);
            font-family: 'Rajdhani', sans-serif;
            font-size: 16px;
            font-weight: 600;
            color: var(--color-text-secondary);
            display: flex;
            align-items: center;
            gap: var(--space-xs);
        }

        .keyboard-key {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--color-border);
            border-radius: 4px;
            padding: 4px 8px;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            font-weight: 700;
            color: var(--color-primary);
            min-width: 32px;
            text-align: center;
        }

        /* ===== ANIMATIONS ===== */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInFromTop {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Apply entrance animations */
        .score-container {
            animation: slideInFromTop var(--transition-slow) var(--ease-out);
        }

        .timer-container {
            animation: slideInFromTop var(--transition-slow) var(--ease-out) 0.1s backwards;
        }

        .pause-button {
            animation: slideInFromTop var(--transition-slow) var(--ease-out) 0.2s backwards;
        }

        /* ===== MEDIA QUERY FOR REDUCED MOTION ===== */
        @media (prefers-reduced-motion: reduce) {

            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* ===== RESPONSIVE ADJUSTMENTS ===== */
        @media (hover: none) {
            .keyboard-hints {
                display: none;
            }
        }

        /* ===== MOBILE TUNING ===== */
        @media (max-width: 600px) {
            :root {
                --space-xs: 6px;
                --space-sm: 12px;
                --space-md: 16px;
                --space-lg: 20px;
                --space-xl: 32px;
            }

            body,
            html {
                font-size: 14px;
            }

            /* Score / Timer / Combo scale down on mobile */
            .score-container {
                padding: 6px 12px;
                border-radius: 6px;
            }

            .score-display {
                font-size: 36px;
            }

            .timer-container {
                top: var(--space-sm);
                right: var(--space-sm);
                min-width: 96px;
                padding: 6px 10px;
            }

            .timer-display {
                font-size: 28px;
            }

            .combo-container {
                top: 100px;
            }

            .combo-display {
                font-size: 18px;
            }

            /* Smaller control buttons */
            .pause-button,
            .back-button,
            .music-button {
                width: 44px;
                height: 44px;
            }

            .pause-icon {
                width: 18px;
                height: 18px;
                stroke-width: 2;
            }

            /* Pause / Game Over overlays scale */
            .pause-title,
            .game-over-title {
                font-size: 36px;
            }

            .stats-container {
                min-width: auto;
                width: 92%;
                max-width: 340px;
                padding: 16px;
            }

            /* Action buttons */
            .btn {
                padding: 12px 28px;
                font-size: 18px;
                min-width: 160px;
            }

            /* Keyboard hints & spacing */
            .keyboard-hints {
                bottom: 12px;
                gap: 8px;
            }

            /* Make canvas touch-friendly */
            #gameCanvas {
                touch-action: manipulation;
            }
        }
    </style>
</head>

    <canvas id="gameCanvas"></canvas>

    <div class="ui-overlay">
        <!-- Left controls: Back + Pause -->
        <div class="left-controls">
            <button class="pause-button back-button" id="backButton" aria-label="Back">
                <svg class="pause-icon" viewBox="0 0 24 24">
                    <path d="M15 6l-6 6 6 6" stroke="var(--color-primary)" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" fill="none" />

            </button>

            <button class="pause-button" id="pauseButton" aria-label="Pause Game">
                <svg class="pause-icon" viewBox="0 0 24 24">
                    <rect x="6" y="4" width="4" height="16" rx="1" />
                    <rect x="14" y="4" width="4" height="16" rx="1" />
                </svg>
            </button>
        </div>

        <!-- Score Display -->
        <div class="score-container">
            <div class="score-label">Score</div>
            <div class="score-display" id="scoreDisplay">0</div>
        </div>

        <!-- Timer Display -->
        <div class="timer-container" id="timerContainer">
            <div class="timer-label">Time</div>
            <div class="timer-display" id="timerDisplay">60</div>
        </div>

        <!-- Music Toggle Button (right edge) -->
        <button class="pause-button music-button" id="musicToggle" aria-label="Toggle Music" title="Toggle Music">
            <svg class="pause-icon" id="musicIcon" viewBox="0 0 24 24">
                <g id="icon-unmuted">
                    <path d="M5 9v6h4l5 4V5L9 9H5z" fill="none" stroke="var(--color-primary)" stroke-width="1.5"
                        stroke-linecap="round" stroke-linejoin="round" />
                    <path d="M19 9a5 5 0 0 1 0 6" fill="none" stroke="var(--color-primary)" stroke-width="1.5"
                        stroke-linecap="round" stroke-linejoin="round" />
                </g>
                <g id="icon-muted" style="display:none;">
                    <path d="M5 9v6h4l5 4V5L9 9H5z" fill="none" stroke="var(--color-primary)" stroke-width="1.5"
                        stroke-linecap="round" stroke-linejoin="round" />
                    <line x1="18" y1="6" x2="6" y2="18" stroke="var(--color-secondary)" stroke-width="2"
                        stroke-linecap="round" />
                </g>
            </svg>
        </button>

        <!-- Combo Display -->
        <div class="combo-container">
            <div class="combo-display" id="comboDisplay"></div>
        </div>

        <!-- Pause Overlay -->
        <div class="pause-overlay" id="pauseOverlay">
            <div class="pause-title">Paused</div>
            <div class="pause-buttons">
                <button class="btn" id="resumeButton">Resume</button>
                <button class="btn btn-secondary" id="restartFromPauseButton">Restart</button>
            </div>
        </div>

        <!-- Game Over Overlay -->
        <div class="game-over-overlay" id="gameOverOverlay">
            <div class="game-over-title">Game Over</div>
            <div class="stats-container">
                <div class="final-score">
                    Score<br>
                    <span class="final-score-value" id="finalScore">0</span>
                </div>
                <div class="best-combo">
                    Best Combo: <span class="best-combo-value" id="bestCombo">0x</span>
                </div>
            </div>
            <button class="btn" id="restartButton">Play Again</button>
        </div>

    </div>
