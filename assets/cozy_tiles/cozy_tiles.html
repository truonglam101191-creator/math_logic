<!DOCTYPE html>
<html>
<head>
    <title>Cozy Tiles</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>/* ===== CSS RESET & BASE ===== */

*, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

body, html { width: 100%; height: 100%; overflow: hidden; font-family: "Poppins", -apple-system, BlinkMacSystemFont, sans-serif; background: linear-gradient(135deg, rgba(255, 192, 224, 0.85) 0%, rgba(176, 224, 255, 0.85) 100%), url('background_cute') center/cover no-repeat fixed; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

/* ===== CSS CUSTOM PROPERTIES ===== */

:root {
            /* Colors */
            --color-primary: #667eea;
            --color-primary-hover: #5568d3;
            --color-accent: #764ba2;
            --color-success: #4ade80;
            --color-warning: #fbbf24;
            --color-danger: #ef4444;
            --color-glass-white: rgba(255, 255, 255, 0.15);
            --color-glass-dark: rgba(0, 0, 0, 0.3);
            --color-text-light: #ffffff;
            --color-text-dim: rgba(255, 255, 255, 0.7);
            
            /* Spacing (8px grid) */
            --space-xs: 8px;
            --space-sm: 16px;
            --space-md: 24px;
            --space-lg: 32px;
            --space-xl: 48px;
            
            /* Animation */
            --transition-fast: 150ms;
            --transition-normal: 300ms;
            --transition-slow: 500ms;
            --ease-out: cubic-bezier(0.0, 0, 0.2, 1);
            --ease-bounce: cubic-bezier(0.68, -0.6, 0.32, 1.6);
            
            /* Shadows & Effects */
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.1);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.15);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.2);
            --shadow-xl: 0 16px 48px rgba(0, 0, 0, 0.3);
            --glow-primary: 0 0 20px rgba(102, 126, 234, 0.5);
        }

/* ===== CANVAS ===== */

#gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
        }

/* ===== GLASS MORPHISM UTILITIES ===== */

.glass-panel {
            background: var(--color-glass-white);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
        }

.glass-button {
            background: var(--color-glass-white);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: var(--color-text-light);
            font-weight: 600;
        }

/* ===== BUTTONS ===== */

.btn {
            min-width: 96px;
            min-height: 96px;
            padding: var(--space-sm) var(--space-lg);
            font-size: 20px;
            font-weight: 700;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: all var(--transition-normal) var(--ease-out);
            font-family: "Poppins", sans-serif;
            text-align: center;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-xs);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

.btn:active {
            transform: scale(0.95);
        }

.btn-primary {
            background: var(--color-primary);
            color: var(--color-text-light);
            box-shadow: var(--shadow-md);
        }

.btn-primary:hover {
            background: var(--color-primary-hover);
            box-shadow: var(--shadow-lg);
        }

.btn-secondary {
            background: var(--color-glass-white);
            backdrop-filter: blur(10px);
            color: var(--color-text-light);
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

.btn-secondary:hover {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.5);
        }

.btn-success {
            background: var(--color-success);
            color: white;
            box-shadow: var(--shadow-md);
        }

.btn-warning {
            background: var(--color-warning);
            color: white;
            box-shadow: var(--shadow-md);
        }

.btn-icon {
            min-width: 96px;
            width: 96px;
            height: 96px;
            padding: 0;
            font-size: 32px;
            border-radius: 50%;
        }


/* ===== MODAL OVERLAY ===== */

.modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity var(--transition-normal) var(--ease-out);
        }

.modal-overlay.active {
            display: flex;
            opacity: 1;
        }

.modal-content {
            background: var(--color-glass-white);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            padding: var(--space-lg);
            max-width: 640px;
            width: calc(100% - 32px);
            max-height: calc(100% - 32px);
            overflow-y: auto;
            box-shadow: var(--shadow-xl);
            transform: scale(0.9);
            transition: transform var(--transition-normal) var(--ease-bounce);
        }

.modal-overlay.active .modal-content {
            transform: scale(1);
        }

.modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-md);
        }

.modal-title {
            font-size: 32px;
            font-weight: 800;
            color: var(--color-text-light);
            margin: 0;
        }

.modal-close {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            font-size: 32px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-fast) var(--ease-out);
        }

.modal-close:hover {
            background: rgba(255, 255, 255, 0.3);
        }

.modal-close:active {
            transform: scale(0.9);
        }

/* ===== TABS ===== */

.modal-tabs {
            display: flex;
            gap: var(--space-xs);
            margin-bottom: var(--space-md);
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

.modal-tab {
            padding: var(--space-sm) var(--space-md);
            min-height: 64px;
            cursor: pointer;
            border: none;
            background: none;
            font-size: 18px;
            font-weight: 600;
            color: var(--color-text-dim);
            border-bottom: 4px solid transparent;
            transition: all var(--transition-normal) var(--ease-out);
            white-space: nowrap;
            font-family: "Poppins", sans-serif;
        }

.modal-tab.active {
            color: var(--color-text-light);
            border-bottom-color: var(--color-primary);
        }

.modal-tab:hover {
            color: var(--color-text-light);
            background: rgba(255, 255, 255, 0.1);
        }

.tab-content {
            display: none;
        }

.tab-content.active {
            display: block;
        }

/* ===== SETTINGS CONTROLS ===== */

.setting-row {
            margin: var(--space-md) 0;
        }

.setting-label {
            font-weight: 700;
            font-size: 18px;
            margin-bottom: var(--space-sm);
            display: block;
            color: var(--color-text-light);
        }

.setting-value {
            color: var(--color-primary);
            font-weight: 800;
        }

/* ===== SKIN GRID ===== */

.skin-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: var(--space-sm);
            margin-top: var(--space-sm);
        }

.skin-option {
            aspect-ratio: 1;
            border: 4px solid transparent;
            border-radius: 16px;
            cursor: pointer;
            transition: all var(--transition-normal) var(--ease-out);
            overflow: hidden;
            position: relative;
            background: rgba(0, 0, 0, 0.3);
        }

.skin-option.selected {
            border-color: var(--color-primary);
            box-shadow: var(--glow-primary);
            transform: scale(1.05);
        }

.skin-option.locked {
            opacity: 0.4;
            cursor: not-allowed;
        }

.skin-option:not(.locked):hover {
            transform: scale(1.05);
            border-color: rgba(255, 255, 255, 0.5);
        }

.skin-option img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

.lock-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.5));
        }

.skin-name {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: var(--space-xs);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
        }

/* ===== RANGE SLIDER ===== */

input[type="range"] {
            width: 100%;
            height: 12px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.2);
            outline: none;
            -webkit-appearance: none;
            margin: var(--space-sm) 0;
        }

input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--color-primary);
            cursor: pointer;
            box-shadow: var(--shadow-md);
            transition: all var(--transition-fast) var(--ease-out);
        }

input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            box-shadow: var(--glow-primary);
        }

input[type="range"]::-moz-range-thumb {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--color-primary);
            cursor: pointer;
            border: none;
            box-shadow: var(--shadow-md);
            transition: all var(--transition-fast) var(--ease-out);
        }

input[type="range"]::-moz-range-thumb:hover {
            transform: scale(1.2);
            box-shadow: var(--glow-primary);
        }

/* ===== TOGGLE SWITCH ===== */

.toggle-switch {
            position: relative;
            display: inline-block;
            width: 80px;
            height: 48px;
        }

.toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

.toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(255, 255, 255, 0.2);
            transition: var(--transition-normal);
            border-radius: 24px;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

.toggle-slider:before {
            position: absolute;
            content: "";
            height: 36px;
            width: 36px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: var(--transition-normal) var(--ease-out);
            border-radius: 50%;
            box-shadow: var(--shadow-sm);
        }

input:checked + .toggle-slider {
            background-color: var(--color-primary);
            border-color: var(--color-primary);
        }

input:checked + .toggle-slider:before {
            transform: translateX(32px);
        }

/* ===== SELECT DROPDOWN ===== */

select {
            width: 100%;
            min-height: 64px;
            padding: var(--space-sm) var(--space-md);
            font-size: 18px;
            font-weight: 600;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            font-family: "Poppins", sans-serif;
            cursor: pointer;
            transition: all var(--transition-fast) var(--ease-out);
        }

select:hover {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.5);
        }

select:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: var(--glow-primary);
        }

select option {
            background: #2d2d2d;
            color: white;
            padding: var(--space-sm);
        }

/* ===== BUTTON GROUP ===== */

.button-group {
            display: flex;
            gap: var(--space-sm);
            margin-top: var(--space-lg);
        }

.button-group .btn {
            flex: 1;
        }

/* ===== ANIMATIONS ===== */

@keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

@keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

@keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

@keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

/* ===== REDUCED MOTION ===== */

@media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

/* ===== FOCUS VISIBLE ===== */

*:focus-visible {
            outline: 3px solid var(--color-primary);
            outline-offset: 4px;
        }

button:focus-visible {
            outline: 3px solid white;
            outline-offset: 4px;
        }</style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <!-- Save Indicator -->
    <div id="saveIndicator" style="position: fixed; top: 20px; right: 20px; background: rgba(74, 222, 128, 0.9); color: white; padding: 12px 24px; border-radius: 12px; font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 16px; box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2); display: none; opacity: 0; transition: opacity 0.3s ease; z-index: 9999;">
        💾 Game Saved
    </div>
    
    <!-- Settings FAB (shown on level select) -->
    
    <!-- Settings Modal -->
    <div id="settingsModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Settings</h2>
                <button class="modal-close" onclick="closeSettings()">×</button>
            </div>
            
            <div class="modal-tabs">
                <button class="modal-tab active" data-tab="appearance">🎨 Appearance</button>
                <button class="modal-tab" data-tab="gameplay">🎮 Gameplay</button>
                <button class="modal-tab" data-tab="audio">🔊 Audio</button>
            </div>
            
            <div id="appearanceTab" class="tab-content active">
                <div class="setting-row">
                    <label class="setting-label">Select Skin</label>
                    <div id="skinGrid" class="skin-grid"></div>
                </div>
            </div>
            
            <div id="gameplayTab" class="tab-content">
                <div class="setting-row">
                    <label class="setting-label">Grid Size</label>
                    <select id="gridSizeSelect">
                        <option value="3">3×3 (Easy)</option>
                        <option value="4">4×4 (Medium)</option>
                        <option value="5">5×5 (Hard)</option>
                    </select>
                </div>
                <div class="setting-row">
                    <label class="setting-label">Shuffle Complexity</label>
                    <select id="shuffleComplexity">
                        <option value="easy">Easy (150 moves)</option>
                        <option value="medium">Medium (250 moves)</option>
                        <option value="hard">Hard (350 moves)</option>
                    </select>
                </div>
            </div>
            
            <div id="audioTab" class="tab-content">
                <div class="setting-row">
                    <label class="setting-label">Music Volume: <span class="setting-value" id="musicVolumeValue">70</span>%</label>
                    <input type="range" id="musicVolumeSlider" min="0" max="100" step="5" value="70">
                </div>
                <div class="setting-row">
                    <label class="setting-label">SFX Volume: <span class="setting-value" id="sfxVolumeValue">80</span>%</label>
                    <input type="range" id="sfxVolumeSlider" min="0" max="100" step="5" value="80">
                </div>
                <div class="setting-row">
                    <label class="setting-label">Music</label>
                    <label class="toggle-switch">
                        <input type="checkbox" id="musicToggle" checked>
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div class="setting-row">
                    <label class="setting-label">Sound Effects</label>
                    <label class="toggle-switch">
                        <input type="checkbox" id="sfxToggle" checked>
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            </div>

            
            <div class="button-group">
                <button class="btn btn-secondary" onclick="resetSettings()">Reset to Default</button>
                <button class="btn btn-primary" onclick="closeSettings()">Done</button>
            </div>
        </div>
    </div>

     <script id="gameConfig"></script>

     <script id="assetsMap" type="application/json"></script>

      <script id="LoadGame"></script>

    <script id="logic"></script>
</body>
</html>
