<!DOCTYPE html>
<html>
<head>
    <title>Garden Gulp</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Inter:wght@400;500;600&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0&display=swap" rel="stylesheet">
    
    <style>/* ============================================
         * CSS RESET & BASE STYLES
         * ============================================ */

*, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden;
            background: #87CEEB;
            font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            touch-action: none;
        }

/* ============================================
         * CSS CUSTOM PROPERTIES
         * ============================================ */

:root {
            /* Animation Timings */
            --transition-fast: 150ms;
            --transition-normal: 300ms;
            --transition-slow: 500ms;
            
            /* Easing Functions */
            --ease-out: cubic-bezier(0.0, 0, 0.2, 1);
            --ease-bounce: cubic-bezier(0.68, -0.6, 0.32, 1.6);
            --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
            
            /* Spacing Scale (8px grid) */
            --space-xs: 8px;
            --space-sm: 16px;
            --space-md: 24px;
            --space-lg: 32px;
            --space-xl: 48px;
            
            /* Color System */
            --color-primary: #4CAF50;
            --color-primary-hover: #45a049;
            --color-primary-light: #81C784;
            --color-accent: #FF9800;
            --color-accent-hover: #F57C00;
            --color-success: #8BC34A;
            --color-danger: #f44336;
            --color-danger-hover: #d32f2f;
            
            /* Neutral Colors */
            --color-bg: #FFFFFF;
            --color-surface: rgba(255, 255, 255, 0.98);
            --color-surface-elevated: rgba(255, 255, 255, 0.95);
            --color-border: rgba(0, 0, 0, 0.1);
            --color-text-primary: #333333;
            --color-text-secondary: #666666;
            --color-text-tertiary: #999999;
            
            /* Shadows & Effects */
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.08);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.12);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.16);
            --shadow-xl: 0 16px 48px rgba(0, 0, 0, 0.2);
            --glow-primary: 0 0 20px rgba(76, 175, 80, 0.3);
            --glow-accent: 0 0 20px rgba(255, 152, 0, 0.3);
            
            /* Border Radius */
            --radius-sm: 12px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --radius-xl: 32px;
            --radius-full: 9999px;
            
            /* Z-Index Scale */
            --z-canvas: 1;
            --z-ui-base: 10;
            --z-fab: 20;
            --z-drawer: 30;
            --z-modal: 40;
            --z-toast: 50;
        }

/* ============================================
         * GAME CANVAS
         * ============================================ */

#gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
            position: relative;
            z-index: var(--z-canvas);
        }

/* ============================================
         * UI CONTAINER
         * ============================================ */

#ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: var(--z-ui-base);
        }

/* ============================================
         * TOP BAR - LEVEL INFO & PROGRESS
         * ============================================ */

#topBar {
            position: absolute;
            top: var(--space-sm);
            left: var(--space-sm);
            right: var(--space-sm);
            display: flex;
            flex-direction: row;
            gap: var(--space-sm);
            pointer-events: auto;
            align-items: stretch;
            height: 64px;
        }

#levelInfo {
            background: linear-gradient(135deg, #4CAF50, #66BB6A);
            padding: var(--space-sm) var(--space-md);
            border-radius: var(--radius-lg);
            font-family: "Fredoka", sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: white;
            box-shadow: var(--shadow-lg), 0 0 20px rgba(76, 175, 80, 0.3);
            text-align: center;
            backdrop-filter: blur(10px);
            border: 3px solid rgba(255, 255, 255, 0.3);
            transition: transform var(--transition-normal) var(--ease-out);
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 140px;
            max-width: 200px;
            line-height: 1.3;
        }

#levelInfo:active {
            transform: scale(0.98);
        }

#timerDisplay {
            background: linear-gradient(135deg, #f44336, #e57373);
            padding: var(--space-sm) var(--space-md);
            border-radius: var(--radius-lg);
            font-family: "Fredoka", sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: white;
            box-shadow: var(--shadow-lg);
            text-align: center;
            backdrop-filter: blur(10px);
            border: 3px solid rgba(255, 255, 255, 0.3);
            transition: all var(--transition-normal) var(--ease-out);
            pointer-events: auto;
            z-index: var(--z-ui-base);
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 110px;
        }

#timerDisplay.warning {
            background: linear-gradient(135deg, #FF9800, #FFB74D);
            color: white;
            border-color: rgba(255, 152, 0, 0.3);
            box-shadow: var(--shadow-lg), 0 0 20px rgba(255, 152, 0, 0.4);
            animation: timerPulse 1s ease-in-out infinite;
        }

#timerDisplay.danger {
            background: linear-gradient(135deg, #f44336, #e57373);
            color: white;
            border-color: rgba(244, 67, 54, 0.3);
            box-shadow: var(--shadow-lg), 0 0 20px rgba(244, 67, 54, 0.5);
            animation: timerPulse 0.5s ease-in-out infinite;
        }

/* ============================================
         * AUDIO CONTROLS
         * ============================================ */

#audioControls {
            position: absolute;
            top: var(--space-sm);
            padding-top: 80px;
            right: var(--space-sm);
            display: flex;
            flex-direction: column;
            gap: var(--space-xs);
            pointer-events: auto;
            z-index: var(--z-ui-base);
        }

.audio-toggle {
            width: 56px;
            height: 56px;
            border-radius: var(--radius-md);
            background: linear-gradient(135deg, #4CAF50, #66BB6A);
            color: white;
            border: 3px solid rgba(255, 255, 255, 0.3);
            box-shadow: var(--shadow-lg);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: all var(--transition-normal) var(--ease-out);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            font-family: inherit;
        }

.audio-toggle:active {
            transform: scale(0.9);
            box-shadow: var(--shadow-md);
        }

.audio-toggle.disabled {
            background: linear-gradient(135deg, #9E9E9E, #BDBDBD);
            opacity: 0.6;
        }

@keyframes timerPulse {
            0%, 100% { 
                transform: scale(1);
                box-shadow: var(--shadow-lg), 0 0 20px rgba(255, 152, 0, 0.4);
            }
            50% { 
                transform: scale(1.05);
                box-shadow: var(--shadow-xl), 0 0 30px rgba(255, 152, 0, 0.6);
            }
        }

#progressContainer {
            position: relative;
            flex: 0 0 auto;
            max-width: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

#progressBar {
            height: 100%;
            width: 100%;
            background: linear-gradient(135deg, #f44336, #e57373);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-lg);
            backdrop-filter: blur(10px);
            border: 3px solid rgba(255, 255, 255, 0.3);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-md) var(--space-lg);
        }

#progressFill {
            display: none;
        }

#progressFill::after {
            display: none;
        }

#progressText {
            position: relative;
            top: auto;
            left: auto;
            transform: none;
            font-family: "Fredoka", sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: white;
            text-shadow: none;
            pointer-events: none;
        }

/* Progress pulse animation */

@keyframes progressPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

.progress-pulse {
            animation: progressPulse var(--transition-normal) var(--ease-bounce);
        }

/* ============================================
         * FLOATING ACTION BUTTON (FAB)
         * ============================================ */

#fabContainer {
            position: absolute;
            bottom: var(--space-lg);
            right: var(--space-lg);
            display: flex;
            flex-direction: column;
            gap: var(--space-sm);
            pointer-events: auto;
            z-index: var(--z-fab);
        }

.fab {
            width: 64px;
            height: 64px;
            border-radius: var(--radius-full);
            background: linear-gradient(135deg, var(--color-primary), var(--color-primary-light));
            color: white;
            border: none;
            box-shadow: var(--shadow-lg);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-family: "Material Symbols Rounded";
            transition: all var(--transition-normal) var(--ease-out);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

.fab:active {
            transform: scale(0.9);
            box-shadow: var(--shadow-md);
        }

.fab.secondary {
            background: linear-gradient(135deg, var(--color-accent), #FFB74D);
        }

.fab.hidden {
            opacity: 0;
            transform: scale(0);
            pointer-events: none;
        }

/* ============================================
         * LEVEL COMPLETE MODAL
         * ============================================ */

#modalBackdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            display: none;
            opacity: 0;
            transition: opacity var(--transition-normal) var(--ease-out);
            z-index: var(--z-modal);
            pointer-events: auto;
        }

#modalBackdrop.visible {
            display: block;
            opacity: 1;
        }

#levelComplete {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background: var(--color-surface);
            padding: var(--space-xl);
            border-radius: var(--radius-xl);
            text-align: center;
            display: none;
            pointer-events: auto;
            box-shadow: var(--shadow-xl);
            max-width: 90%;
            width: 400px;
            opacity: 0;
            transition: all var(--transition-normal) var(--ease-bounce);
            z-index: var(--z-modal);
        }

#levelComplete.visible {
            display: block;
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

#levelComplete h2 {
            margin: 0 0 var(--space-md) 0;
            font-family: "Fredoka", sans-serif;
            font-size: 48px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--color-primary), var(--color-success));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

#completeStats {
            margin: var(--space-md) 0;
            font-family: "Inter", sans-serif;
            font-size: 20px;
            font-weight: 500;
            color: var(--color-text-secondary);
        }

#nextLevelBtn {
            margin-top: var(--space-lg);
            padding: var(--space-md) var(--space-xl);
            font-family: "Fredoka", sans-serif;
            font-size: 24px;
            font-weight: 600;
            background: linear-gradient(135deg, var(--color-primary), var(--color-success));
            color: white;
            border: none;
            border-radius: var(--radius-lg);
            cursor: pointer;
            box-shadow: var(--shadow-md);
            transition: all var(--transition-normal) var(--ease-out);
            min-width: 200px;
            min-height: 64px;
        }

#nextLevelBtn:active {
            transform: scale(0.95);
            box-shadow: var(--shadow-sm);
        }

/* ============================================
         * EDIT MODE DRAWER
         * ============================================ */

#editDrawerBackdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(4px);
            display: none;
            opacity: 0;
            transition: opacity var(--transition-normal) var(--ease-out);
            z-index: var(--z-drawer);
            pointer-events: auto;
        }

#editDrawerBackdrop.visible {
            display: block;
            opacity: 1;
        }

#editDrawer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--color-surface);
            border-radius: var(--radius-xl) var(--radius-xl) 0 0;
            padding: var(--space-md);
            display: none;
            transform: translateY(100%);
            transition: transform var(--transition-normal) var(--ease-out);
            z-index: var(--z-drawer);
            pointer-events: auto;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: var(--shadow-xl);
        }

#editDrawer.visible {
            display: block;
            transform: translateY(0);
        }

#drawerHandle {
            width: 48px;
            height: 4px;
            background: var(--color-border);
            border-radius: var(--radius-full);
            margin: 0 auto var(--space-md);
        }

#editDrawer h3 {
            margin: 0 0 var(--space-md) 0;
            font-family: "Fredoka", sans-serif;
            font-size: 24px;
            font-weight: 600;
            color: var(--color-text-primary);
            text-align: center;
        }

.edit-section {
            margin-bottom: var(--space-md);
        }

.edit-section label {
            display: block;
            margin-bottom: var(--space-xs);
            font-family: "Inter", sans-serif;
            font-size: 14px;
            font-weight: 600;
            color: var(--color-text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

.edit-section select,
        .edit-section input[type="range"] {
            width: 100%;
            padding: var(--space-sm);
            border: 2px solid var(--color-border);
            border-radius: var(--radius-md);
            font-family: "Inter", sans-serif;
            font-size: 16px;
            background: white;
            color: var(--color-text-primary);
            transition: border-color var(--transition-fast) var(--ease-out);
        }

.edit-section select:focus,
        .edit-section input[type="range"]:focus {
            outline: none;
            border-color: var(--color-primary);
        }

.edit-section input[type="range"] {
            height: 48px;
            -webkit-appearance: none;
            appearance: none;
            background: transparent;
            cursor: pointer;
        }

.edit-section input[type="range"]::-webkit-slider-track {
            height: 8px;
            background: var(--color-border);
            border-radius: var(--radius-full);
        }

.edit-section input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            background: var(--color-primary);
            border-radius: var(--radius-full);
            cursor: pointer;
            margin-top: -8px;
            box-shadow: var(--shadow-sm);
        }

.edit-section input[type="range"]::-moz-range-track {
            height: 8px;
            background: var(--color-border);
            border-radius: var(--radius-full);
        }

.edit-section input[type="range"]::-moz-range-thumb {
            width: 24px;
            height: 24px;
            background: var(--color-primary);
            border-radius: var(--radius-full);
            cursor: pointer;
            border: none;
            box-shadow: var(--shadow-sm);
        }

.edit-btn {
            width: 100%;
            padding: var(--space-md);
            margin-bottom: var(--space-sm);
            font-family: "Fredoka", sans-serif;
            font-size: 18px;
            font-weight: 600;
            background: var(--color-primary);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            transition: all var(--transition-normal) var(--ease-out);
            min-height: 56px;
        }

.edit-btn:active {
            transform: scale(0.98);
            box-shadow: none;
        }

.edit-btn.secondary {
            background: var(--color-accent);
        }

.edit-btn.danger {
            background: var(--color-danger);
        }

#objectPalette {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--space-sm);
            margin-top: var(--space-sm);
        }

.palette-item {
            aspect-ratio: 1;
            border: 2px solid var(--color-border);
            border-radius: var(--radius-md);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            overflow: hidden;
            transition: all var(--transition-fast) var(--ease-out);
            min-height: 96px;
        }

.palette-item:active {
            transform: scale(0.95);
            border-color: var(--color-primary);
            box-shadow: var(--shadow-sm);
        }

.palette-item img {
            max-width: 80%;
            max-height: 80%;
            object-fit: contain;
        }

        .back-button {
            width: 56px;
            height: 56px;
            border-radius: var(--radius-md);
            background: linear-gradient(135deg, #4CAF50, #66BB6A);
            color: white;
            border: 3px solid rgba(255, 255, 255, 0.3);
            box-shadow: var(--shadow-lg);
            padding-bottom: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: all var(--transition-normal) var(--ease-out);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            font-family: inherit;
        }

/* ============================================
         * ANIMATIONS
         * ============================================ */

@keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

@keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

@keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

@keyframes slideUp {
            from {
                transform: translateY(100%);
            }
            to {
                transform: translateY(0);
            }
        }

/* ============================================
         * REDUCED MOTION PREFERENCES
         * ============================================ */

@media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

/* ============================================
         * UTILITY CLASSES
         * ============================================ */

.hidden {
            display: none !important;
        }

.fade-in {
            animation: fadeIn var(--transition-normal) var(--ease-out);
        }

.scale-in {
            animation: scaleIn var(--transition-normal) var(--ease-bounce);
        }</style>
</head>
<style>
/* Mobile responsive overrides */
@media (max-width: 600px) {
    :root {
        --space-xs: 6px;
        --space-sm: 12px;
        --space-md: 16px;
        --space-lg: 20px;
        --radius-sm: 10px;
        --radius-md: 12px;
        --radius-lg: 16px;
    }

    html, body {
        font-size: 14px;
        -webkit-text-size-adjust: 100%;
    }

    #gameCanvas {
        width: 100vw !important;
        height: 100vh !important;
        display: block;
    }

    #topBar {
        top: var(--space-sm);
        left: var(--space-sm);
        right: var(--space-sm);
        height: 56px;
        gap: var(--space-xs);
        align-items: center;
        padding-right: 8px;
    }

    #levelInfo {
        font-size: 14px;
        min-width: 110px;
        max-width: 160px;
        padding: 8px 12px;
    }

    #timerDisplay {
        min-width: 80px;
        font-size: 14px;
        padding: 8px 10px;
    }

    #progressContainer { max-width: 110px; }
    #progressBar { padding: 8px; min-width: 70px; }
    #progressText { font-size: 13px; }

    #audioControls { top: var(--space-sm); right: var(--space-sm); gap: var(--space-xs); }
    .audio-toggle { width: 48px; height: 48px; font-size: 20px; }

    #fabContainer { bottom: calc(var(--space-md)); right: calc(var(--space-md)); }
    .fab { width: 56px; height: 56px; font-size: 28px; }

    #editDrawer { padding: 12px; max-height: 72vh; }
    #editDrawer h3 { font-size: 18px; }
    .palette-item { min-height: 72px; }

    #levelComplete { width: 92%; max-width: 360px; padding: 20px; }
    #levelComplete h2 { font-size: 32px; }

    /* Increase hit targets for small touch devices */
    button, .audio-toggle, .fab, .edit-btn { min-height: 48px; }
}

@media (max-width: 380px) {
    :root { --space-xs: 6px; --space-sm: 10px; --space-md: 12px; }
    #levelInfo { font-size: 13px; min-width: 100px; }
    #progressText { font-size: 12px; }
    .audio-toggle { width: 44px; height: 44px; font-size: 18px; }
    .fab { width: 52px; height: 52px; font-size: 24px; }
}
</style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui">
        <!-- Top Bar: Level Info, Progress & Timer -->
        <div id="topBar">
            <button id="backButton" class="back-button" onclick="handleBackButton()" title="Back">←</button>
            <div id="levelInfo">Level 1 - Fruit Garden</div>
            <div id="progressContainer">
                <div id="progressBar">
                    <div id="progressFill"></div>
                    <div id="progressText">🍽️ 0 / 0</div>
                </div>
            </div>
            <div id="timerDisplay">⏱️ 60s</div>
        </div>
        
        <div id="audioControls">
            <button class="audio-toggle" id="musicToggle" title="Toggle Music">🎵</button>
            <button class="audio-toggle" id="soundToggle" title="Toggle Sound Effects">🔊</button>
        </div>
        
        <!-- Floating Action Buttons -->
        <div id="fabContainer">
            <button class="fab hidden" id="editFab" title="Edit Level">edit</button>
        </div>
        
        <!-- Level Complete Modal -->
        <div id="modalBackdrop"></div>
        <div id="levelComplete">
            <h2>🎉 Level Complete!</h2>
            <p id="completeStats"></p>
            <button id="nextLevelBtn">Next Level</button>
        </div>
        
        <!-- Edit Mode Drawer -->
        <div id="editDrawerBackdrop"></div>
        <div id="editDrawer">
            <div id="drawerHandle"></div>
            <h3>✏️ Edit Level</h3>
            
            <div class="edit-section">
                <label>Theme</label>
                <select id="themeSelect">
                    <option value="fruit">🍎 Fruit Garden</option>
                    <option value="toy">🧸 Toy Box</option>
                    <option value="vegetable">🥕 Vegetable Patch</option>
                    <option value="picnic">🧺 Picnic Scene</option>
                    <option value="pet">🐶 Pet Paradise</option>
                    <option value="candy">🍭 Candy Land</option>
                    <option value="beach">🏖️ Beach Day</option>
                    <option value="forest">🌲 Forest Floor</option>
                </select>
            </div>
            
            <div class="edit-section">
                <label>Object Count: <span id="objectCountLabel">20</span></label>
                <input type="range" id="objectCountSlider" min="10" max="50" value="20">
            </div>
            
            <div class="edit-section">
                <label>Starting Hole Size: <span id="holeSizeLabel">80</span></label>
                <input type="range" id="holeSizeSlider" min="60" max="100" value="80">
            </div>
            
            <div class="edit-section">
                <label>Max Hole Multiplier: <span id="holeMultLabel">3.0</span>x</label>
                <input type="range" id="holeMultSlider" min="2" max="4" step="0.1" value="3">
            </div>
            
            <div class="edit-section">
                <label>Time Limit: <span id="timeLimitLabel">60</span>s</label>
                <input type="range" id="timeLimitSlider" min="30" max="180" step="10" value="60">
            </div>
            
            <button class="edit-btn" id="randomGenBtn">🎲 Random Generate</button>
            <button class="edit-btn secondary" id="testLevelBtn">▶️ Test Level</button>
            <button class="edit-btn danger" id="clearAllBtn">🗑️ Clear All</button>
            
            <div class="edit-section">
                <label>Add Objects</label>
                <div id="objectPalette"></div>
            </div>
        </div>
    </div>
    <input id="configFileInput" type="file" accept="application/json" style="display:none">

     <script id="gameConfig"></script>

    <script id="assetsMap" type="application/json"></script>

    <script id="logic"></script>
</body>
</html>
